<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<title>melo.</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;--s4:#2e2e2e;
  --t1:#ffffff;--t2:#888;--t3:#444;
  --red:#ff3b30;--dr:255;--dg:59;--db:48;
  --nav:62px;--bot:env(safe-area-inset-bottom,0px);--top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}

/* ─ AUTH ─────────────────────────────────────────── */
#auth{
  position:fixed;inset:0;z-index:99;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:48px;padding:48px 28px;
  transition:opacity .3s,transform .3s;
}
#auth.gone{opacity:0;pointer-events:none;transform:scale(.96)}
.auth-top{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
.auth-mark{
  width:64px;height:64px;border-radius:18px;
  background:var(--s2);border:1px solid var(--s3);
  display:flex;align-items:center;justify-content:center;
}
.logo-text{font-size:2rem;font-weight:700;letter-spacing:-.05em}
.logo-text b{color:var(--red);font-weight:700}
.auth-sub{font-size:.85rem;color:var(--t3);font-weight:400}
#gbtn-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.allow-btn{
  padding:14px 32px;background:var(--red);color:#fff;
  border:none;border-radius:12px;
  font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;letter-spacing:-.01em;
  transition:opacity .15s;
}
.allow-btn:hover{opacity:.85}
.allow-note{font-size:.75rem;color:var(--t3);text-align:center}

/* ─ APP ──────────────────────────────────────────── */
#app{height:100vh;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s}
#app.show{opacity:1;pointer-events:all}

/* ─ HEADER ───────────────────────────────────────── */
.hdr{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:calc(14px + var(--top)) 16px 12px;
  background:var(--bg);
}
.hdr-logo{font-size:1.1rem;font-weight:700;letter-spacing:-.04em;flex-shrink:0;cursor:pointer}
.hdr-logo b{color:var(--red)}
.search-pill{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--s2);border-radius:100px;
  padding:9px 14px;
  transition:background .15s;
}
.search-pill:focus-within{background:var(--s3)}
.search-pill input{
  flex:1;background:none;border:none;outline:none;
  color:var(--t1);font-family:'Inter',sans-serif;font-size:.85rem;min-width:0;
}
.search-pill input::placeholder{color:var(--t3)}
.search-clear{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.75rem;display:none;padding:2px}
.search-pill input:not(:placeholder-shown)~.search-clear{display:block}
.hdr-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;object-fit:cover;background:var(--s2);cursor:pointer}

/* ─ FEED ─────────────────────────────────────────── */
.feed{flex:1;overflow-y:auto;overflow-x:hidden}

/* ─ SECTION ──────────────────────────────────────── */
.sec{padding:20px 16px 4px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-label{font-size:.9rem;font-weight:600;letter-spacing:-.02em}
.sec-count{font-size:.72rem;color:var(--t3)}

/* ─ CARD STRIP ───────────────────────────────────── */
.strip{display:flex;gap:10px;overflow-x:auto;padding:0 16px 2px;margin:0 -16px;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.card{flex-shrink:0;width:130px;cursor:pointer}
.card:active{opacity:.65}
.card-img{
  width:130px;height:130px;border-radius:10px;
  overflow:hidden;background:var(--s2);
  position:relative;margin-bottom:8px;
}
.card-img img{width:130px;height:130px;object-fit:cover;display:block}
.card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:2rem}
.card-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .14s}
.card:hover .card-ov{opacity:1}
.card-play{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#000}
.card-now{position:absolute;bottom:6px;left:6px;background:var(--red);border-radius:4px;padding:2px 6px;font-size:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#fff}
.card-title{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:.69rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* ─ TRACK LIST ───────────────────────────────────── */
.tracklist{display:flex;flex-direction:column}
.track{display:flex;align-items:center;gap:12px;padding:7px 0;cursor:pointer}
.track:active{opacity:.6}
.track.active .track-title{color:var(--red)}
.track-art{width:46px;height:46px;min-width:46px;border-radius:8px;object-fit:cover;background:var(--s2);display:block}
.track-art-ph{width:46px;height:46px;min-width:46px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:1.1rem}
.track-info{flex:1;min-width:0}
.track-title{font-size:.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:.72rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.track-add{background:none;border:none;color:var(--t3);font-size:1.1rem;cursor:pointer;padding:6px;flex-shrink:0;border-radius:50%;transition:color .12s}
.track-add:hover{color:var(--red)}

/* ─ MINI BAR ─────────────────────────────────────── */
.mini{
  flex-shrink:0;
  margin:0 10px 6px;
  background:var(--s1);border:1px solid var(--s3);
  border-radius:14px;padding:9px 10px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;position:relative;overflow:hidden;
}
.mini-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--s3)}
.mini-bar-fill{height:100%;background:var(--red);transition:width .4s linear}
.mini-art{width:40px;height:40px;min-width:40px;border-radius:7px;object-fit:cover;background:var(--s2);display:block;position:relative;flex-shrink:0}
.mini-art-ph{width:40px;height:40px;min-width:40px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:1rem;flex-shrink:0}
.mini-eq{position:absolute;inset:0;border-radius:7px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;gap:2px;opacity:0;transition:opacity .18s}
.mini-eq.on{opacity:1}
.eq{width:3px;background:var(--red);border-radius:2px;animation:eqa .8s ease infinite}
.eq:nth-child(1){height:8px;animation-delay:0s}
.eq:nth-child(2){height:14px;animation-delay:.12s}
.eq:nth-child(3){height:6px;animation-delay:.26s}
.eq:nth-child(4){height:12px;animation-delay:.07s}
@keyframes eqa{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.mini-meta{flex:1;min-width:0}
.mini-title{font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-artist{font-size:.71rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.mini-btns{display:flex;align-items:center;gap:1px;flex-shrink:0}
.mini-btn{background:none;border:none;color:var(--t2);cursor:pointer;padding:7px;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .12s}
.mini-btn:hover{color:var(--t1);background:var(--s3)}
.mini-pp{background:var(--t1)!important;color:var(--bg)!important;border-radius:50%;font-size:.78rem;width:33px;height:33px}

/* ─ NAV ──────────────────────────────────────────── */
.nav{
  flex-shrink:0;display:flex;align-items:center;
  height:calc(var(--nav) + var(--bot));
  padding-bottom:var(--bot);
  background:var(--s1);border-top:1px solid var(--s2);
}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:7px 0;color:var(--t3);transition:color .14s}
.nav-tab.on{color:var(--red)}
.nav-ic{font-size:1.1rem;line-height:1}
.nav-lb{font-size:.53rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* ─ FULL PLAYER ──────────────────────────────────── */
.player{
  position:fixed;inset:0;z-index:50;
  background:var(--bg);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .34s cubic-bezier(.3,0,.2,1);
}
.player.open{transform:none}
.player-tint{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 90% 38% at 50% 0%,rgba(var(--dr),var(--dg),var(--db),.12) 0%,transparent 55%);transition:background .6s}
.player-hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:calc(16px + var(--top)) 20px 8px;position:relative;z-index:1}
.phdr-btn{width:30px;height:30px;border-radius:50%;background:var(--s2);border:none;color:var(--t2);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.phdr-label{font-size:.63rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.player-art-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 32px;min-height:0;position:relative;z-index:1}
.art-container{position:relative;display:inline-flex;align-items:center;justify-content:center}
.art-glow{position:absolute;inset:-25%;background:radial-gradient(circle,rgba(var(--dr),var(--dg),var(--db),.35) 0%,transparent 65%);filter:blur(22px);z-index:0;transition:background .6s;pointer-events:none}
.art-ring{position:absolute;inset:-2px;border-radius:25px;background:conic-gradient(rgba(var(--dr),var(--dg),var(--db),.8) 0deg,rgba(var(--dr),var(--dg),var(--db),.08) 90deg,rgba(var(--dr),var(--dg),var(--db),.75) 180deg,rgba(var(--dr),var(--dg),var(--db),.06) 270deg,rgba(var(--dr),var(--dg),var(--db),.8) 360deg);z-index:1;animation:spin 7s linear infinite;transition:background .6s}
@keyframes spin{to{transform:rotate(360deg)}}
.art-gap{position:absolute;inset:1.5px;border-radius:23.5px;background:var(--bg);z-index:2}
.player-img{width:calc(100vw - 64px);max-width:290px;aspect-ratio:1;border-radius:22px;object-fit:cover;display:block;position:relative;z-index:3;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.player-img-ph{width:calc(100vw - 64px);max-width:290px;aspect-ratio:1;border-radius:22px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:3.5rem;position:relative;z-index:3}
.player-meta{flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;padding:8px 22px 4px;position:relative;z-index:1}
.player-title{font-size:1.15rem;font-weight:700;letter-spacing:-.03em;line-height:1.2;margin-bottom:3px}
.player-artist{font-size:.84rem;color:var(--t2);font-weight:400}
.player-heart{background:none;border:none;font-size:1.25rem;cursor:pointer;padding:4px 0 4px 10px;color:var(--t3);flex-shrink:0;margin-top:2px;transition:color .18s}
.player-heart.on{color:var(--red)}
.player-progress{flex-shrink:0;padding:10px 22px 5px;position:relative;z-index:1}
.prog-track{height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;margin-bottom:6px;transition:height .14s}
.prog-track:hover{height:5px}
.prog-fill{height:100%;border-radius:2px;background:var(--red);pointer-events:none;transition:width .12s linear,background .5s}
.prog-times{display:flex;justify-content:space-between;font-size:.66rem;color:var(--t3)}
.player-controls{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;position:relative;z-index:1}
.ctrl{background:none;border:none;color:var(--t3);cursor:pointer;padding:8px;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .14s}
.ctrl:hover{color:var(--t1);background:var(--s2)}
.ctrl.on{color:var(--red)}
.ctrl-skip{font-size:1.25rem;color:var(--t2);width:46px;height:46px}
.ctrl-skip:hover{color:var(--t1)}
.ctrl-play{width:56px;height:56px;background:var(--t1);color:var(--bg)!important;font-size:1.15rem;border-radius:50%;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.ctrl-play:active{transform:scale(.93)}
.player-vol{flex-shrink:0;display:flex;align-items:center;gap:9px;padding:0 22px 8px;position:relative;z-index:1}
.vol-ic{font-size:.84rem;color:var(--t3);cursor:pointer;flex-shrink:0}
.vol-track{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;overflow:hidden}
.vol-fill{height:100%;background:rgba(255,255,255,.22);border-radius:2px;pointer-events:none}

/* ─ ACCOUNT MENU ─────────────────────────────────── */
.amenu{position:fixed;top:52px;right:14px;z-index:60;background:var(--s2);border:1px solid var(--s3);border-radius:12px;padding:5px;min-width:180px;box-shadow:0 8px 28px rgba(0,0,0,.6);opacity:0;pointer-events:none;transform:translateY(-5px) scale(.97);transition:all .14s}
.amenu.on{opacity:1;pointer-events:all;transform:none}
.amenu-user{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--s3);margin-bottom:4px}
.amenu-av{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--s3)}
.amenu-name{font-size:.79rem;font-weight:600}
.amenu-email{font-size:.67rem;color:var(--t2)}
.amenu-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;font-size:.79rem;cursor:pointer;color:var(--t2);transition:all .12s}
.amenu-item:hover{background:var(--s3);color:var(--t1)}
.amenu-item.danger{color:var(--red)}

/* ─ EMPTY / SKELETON ─────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 24px;text-align:center;gap:10px}
.empty-ic{font-size:2.2rem;opacity:.15}
.empty-title{font-size:.9rem;font-weight:600;color:var(--t2)}
.empty-sub{font-size:.77rem;color:var(--t3);line-height:1.65;max-width:220px}
.skwrap{padding:20px 16px 6px}
.sktitle{height:14px;width:100px;background:var(--s2);border-radius:5px;margin-bottom:18px;animation:sk 1.4s ease infinite}
.skcards{display:flex;gap:10px;padding:0 16px;overflow:hidden;margin:0 -16px}
.skc{flex-shrink:0}
.skca{width:130px;height:130px;border-radius:10px;background:var(--s2);margin-bottom:8px;animation:sk 1.4s ease infinite}
.skcl{height:9px;background:var(--s2);border-radius:5px;margin-bottom:5px;animation:sk 1.4s ease infinite}
.skcl2{height:8px;width:55%;background:var(--s2);border-radius:5px;animation:sk 1.4s ease infinite}
.skrows{padding:0 16px;margin-top:22px}
.skr{display:flex;align-items:center;gap:11px;padding:7px 0}
.skth{width:46px;height:46px;border-radius:8px;background:var(--s2);flex-shrink:0;animation:sk 1.4s ease infinite}
.skl{flex:1}
.skl1{height:10px;background:var(--s2);border-radius:5px;margin-bottom:6px;animation:sk 1.4s ease infinite}
.skl2{height:9px;width:48%;background:var(--s2);border-radius:5px;animation:sk 1.4s ease infinite}
@keyframes sk{0%,100%{opacity:1}50%{opacity:.28}}
.toastwrap{position:fixed;bottom:calc(var(--nav) + 62px + 14px);left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;width:max-content;max-width:85vw}
.toast{background:var(--s4);border-radius:100px;padding:7px 16px;font-size:.77rem;font-weight:500;white-space:nowrap;animation:tpop .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes tpop{from{opacity:0;transform:scale(.8)translateY(4px)}to{opacity:1;transform:none}}
@media(min-width:580px){.player-img,.player-img-ph{max-width:320px}.card,.card-img{width:148px;height:148px}}
</style>
</head>
<body>
<div id="ytp" style="position:fixed;top:-1px;left:-1px;width:1px;height:1px;opacity:0;pointer-events:none"></div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-top">
    <div class="auth-mark">
      <svg width="32" height="24" viewBox="0 0 64 48" fill="none">
        <defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff6060" stop-opacity=".5"/><stop offset="45%" stop-color="#ff3b30"/><stop offset="100%" stop-color="#ff1a0e" stop-opacity=".6"/></linearGradient></defs>
        <rect x="0"  y="22" width="7" height="9"  rx="3.5" fill="url(#wg)" opacity=".4"/>
        <rect x="9"  y="14" width="7" height="20" rx="3.5" fill="url(#wg)" opacity=".65"/>
        <rect x="18" y="4"  width="7" height="40" rx="3.5" fill="url(#wg)"/>
        <rect x="27" y="10" width="7" height="28" rx="3.5" fill="url(#wg)"/>
        <rect x="36" y="0"  width="7" height="48" rx="3.5" fill="url(#wg)"/>
        <rect x="45" y="8"  width="7" height="32" rx="3.5" fill="url(#wg)" opacity=".72"/>
        <rect x="54" y="18" width="7" height="12" rx="3.5" fill="url(#wg)" opacity=".4"/>
      </svg>
    </div>
    <div class="logo-text">melo<b>.</b></div>
    <div class="auth-sub">Music from artists you love</div>
  </div>
  <div id="gbtn-wrap"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-logo">melo<b>.</b></div>
    <div class="search-pill">
      <input id="sinp" type="search" placeholder="Artists, songs, albums…"
        oninput="onSearch(this.value)"
        onkeydown="if(event.key==='Enter')doSearch(this.value)"
        autocomplete="off" enterkeyhint="search"/>
      <button class="search-clear" onclick="clearSearch()">&#x2715;</button>
    </div>
    <img class="hdr-av" id="uav" src="" alt="" onclick="togMenu()"/>
  </div>
  <div class="feed" id="feed"></div>
  <div class="mini" id="mini" onclick="openPlayer()">
    <div style="position:relative;flex-shrink:0">
      <div class="mini-art-ph" id="mph" style="width:40px;height:40px;min-width:40px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:1rem">&#9834;</div>
      <img id="mart" class="mini-art" src="" alt="" style="display:none"/>
      <div class="mini-eq" id="meq"><div class="eq"></div><div class="eq"></div><div class="eq"></div><div class="eq"></div></div>
    </div>
    <div class="mini-meta">
      <div class="mini-title" id="mtitle">Nothing playing</div>
      <div class="mini-artist" id="martist">Pick a song to start</div>
    </div>
    <div class="mini-btns" onclick="event.stopPropagation()">
      <button class="mini-btn" onclick="prev()">&#9198;</button>
      <button class="mini-btn mini-pp" id="mpp" onclick="togPlay()">&#9654;</button>
      <button class="mini-btn" onclick="nextSong()">&#9197;</button>
    </div>
    <div class="mini-bar"><div class="mini-bar-fill" id="mbf" style="width:0%"></div></div>
  </div>
  <nav class="nav">
    <div class="nav-tab on" id="bn-home"    onclick="setView('home')">   <span class="nav-ic">&#8962;</span><span class="nav-lb">Home</span></div>
    <div class="nav-tab"    id="bn-search"  onclick="setView('search');focusSearch()"><span class="nav-ic">&#9835;</span><span class="nav-lb">Search</span></div>
    <div class="nav-tab"    id="bn-library" onclick="setView('library')"><span class="nav-ic">&#9782;</span><span class="nav-lb">Library</span></div>
    <div class="nav-tab"    id="bn-queue"   onclick="setView('queue')">  <span class="nav-ic">&#8801;</span><span class="nav-lb">Queue</span></div>
  </nav>
</div>

<!-- FULL PLAYER -->
<div class="player" id="player">
  <div class="player-tint"></div>
  <div class="player-hdr">
    <button class="phdr-btn" onclick="closePlayer()">&#8595;</button>
    <span class="phdr-label">Now Playing</span>
    <button class="phdr-btn">&#183;&#183;&#183;</button>
  </div>
  <div class="player-art-wrap">
    <div class="art-container">
      <div class="art-glow"></div>
      <div class="art-ring"></div>
      <div class="art-gap"></div>
      <div class="player-img-ph" id="pph">&#9834;</div>
      <img class="player-img" id="pimg" src="" alt="" style="display:none"/>
    </div>
  </div>

// ── YOUTUBE MUSIC - OFFICIAL TRACKS ONLY ──────────────
// musicVideoType:
//   ATV = Official Audio (distributed) ✓
//   OMV = Official Music Video         ✓
//   UGC = User upload                  ✗ SKIP
//   null/missing = regular YouTube     ✗ SKIP

async function ytm(ep, body) {
  const h = {
    'Content-Type': 'application/json',
    'Origin': 'https://music.youtube.com',
    'Referer': 'https://music.youtube.com/',
    'User-Agent': 'Mozilla/5.0',
  };
  if (tok) h['Authorization'] = 'Bearer ' + tok;
  const r = await fetch(
    'https://music.youtube.com/youtubei/v1/' + ep + '?key=AIzaSyC9XL3ZjWddXya6X74dJoCTL-WEYFDNX30',
    { method: 'POST', headers: h, body: JSON.stringify({ context: { client: { clientName: 'WEB_REMIX', clientVersion: '1.20240101.01.00', hl: 'en', gl: 'US' } }, ...body }) }
  );
  if (!r.ok) throw new Error('YTM ' + r.status);
  return r.json();
}

async function ytapi(url) {
  if (!tok) throw new Error('Not signed in');
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + tok } });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}

function videoType(r) {
  return r?.overlay?.musicItemThumbnailOverlayRenderer
    ?.content?.musicPlayButtonRenderer
    ?.playNavigationEndpoint?.watchEndpoint
    ?.watchEndpointMusicSupportedConfigs
    ?.watchEndpointMusicConfig?.musicVideoType || null;
}

function vidId(r) {
  return r?.overlay?.musicItemThumbnailOverlayRenderer
    ?.content?.musicPlayButtonRenderer
    ?.playNavigationEndpoint?.watchEndpoint?.videoId
    || r?.flexColumns?.[0]?.musicResponsiveListItemFlexColumnRenderer
        ?.text?.runs?.[0]?.navigationEndpoint?.watchEndpoint?.videoId
    || r?.navigationEndpoint?.watchEndpoint?.videoId
    || null;
}

function sqThumb(thumbs, vid) {
  if (!thumbs?.length) return vid ? 'https://i.ytimg.com/vi/' + vid + '/hqdefault.jpg' : '';
  const best = [...thumbs].sort((a,b) => (b.width||0) - (a.width||0))[0];
  return (best.url || '').replace(/=w\d+-h\d+[^&]*/g, '=w400-h400-l90-rj').replace(/\?imgmax=\d+/, '');
}

function parseItems(items) {
  const songs = [];
  for (const item of (items || [])) {
    const r = item?.musicResponsiveListItemRenderer;
    if (!r) continue;
    const id = vidId(r);
    if (!id) continue;
    const type = videoType(r);
    // STRICT filter — only official audio or official music video
    if (type !== 'MUSIC_VIDEO_TYPE_ATV') continue; // official audio only
    const thumbs = r?.thumbnail?.musicThumbnailRenderer?.thumbnail?.thumbnails;
    const title  = r?.flexColumns?.[0]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs?.[0]?.text || '';
    const sub    = r?.flexColumns?.[1]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs || [];
    songs.push({ id, title: clean(title), artist: clean(sub[0]?.text || ''), thumb: sqThumb(thumbs, id) });
  }
  return songs;
}

function parseSections(contents) {
  const songs = [], artists = [], albums = [];
  for (const sec of (contents || [])) {
    const shelf = sec?.musicShelfRenderer || sec?.musicCarouselShelfRenderer;
    if (!shelf) continue;
    for (const item of (shelf.contents || [])) {
      const r = item?.musicResponsiveListItemRenderer || item?.musicTwoRowItemRenderer;
      if (!r) continue;
      const id      = vidId(r);
      const browse  = r?.navigationEndpoint?.browseEndpoint?.browseId;
      const type    = videoType(r);
      const thumbsA = r?.thumbnail?.musicThumbnailRenderer?.thumbnail?.thumbnails;
      const thumbsB = r?.thumbnailRenderer?.musicThumbnailRenderer?.thumbnail?.thumbnails;
      const thumbs  = thumbsA || thumbsB;
      const title   = r?.flexColumns?.[0]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs?.[0]?.text
                   || r?.title?.runs?.[0]?.text || '';
      const sub     = r?.flexColumns?.[1]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs
                   || r?.subtitle?.runs || [];
      const artist  = sub[0]?.text || '';

      if (id && type === 'MUSIC_VIDEO_TYPE_ATV') { // official audio only
        songs.push({ id, title: clean(title), artist: clean(artist), thumb: sqThumb(thumbs, id) });
      } else if (!id && browse?.startsWith('UC')) {
        artists.push({ id: browse, title: clean(title), artist: 'Artist', thumb: sqThumb(thumbs, null), isArtist: true, browseId: browse });
      } else if (!id && (browse?.startsWith('MPREb') || browse?.startsWith('OLAK'))) {
        albums.push({ id: browse, title: clean(title), artist: clean(artist), thumb: sqThumb(thumbs, null), isAlbum: true, browseId: browse });
      }
    }
  }
  return { songs, artists, albums };
}

function getSections(d) {
  return d?.contents?.tabbedSearchResultsRenderer?.tabs?.[0]?.tabRenderer
           ?.content?.sectionListRenderer?.contents
      || d?.contents?.sectionListRenderer?.contents || [];
}

async function ytmSearch(q) {
  // Songs-only filter
  const d = await ytm('search', { query: q, params: 'EgWKAQIIAWoKEAkQBRAKEAMQBA%3D%3D' });
  const r  = parseSections(getSections(d));
  // Also search artists + albums in parallel using correct filter params
  const [ar, al] = await Promise.allSettled([
    ytm('search', { query: q, params: 'EgWKAQIgAWoKEAkQBRAKEAMQBA%3D%3D' }).then(d => parseSections(getSections(d)).artists),
    ytm('search', { query: q, params: 'EgWKAQIYAWoKEAkQBRAKEAMQBA%3D%3D' }).then(d => parseSections(getSections(d)).albums),
  ]);
  return {
    songs:   r.songs,
    artists: ar.status === 'fulfilled' ? ar.value : [],
    albums:  al.status === 'fulfilled' ? al.value : [],
  };
}

async function ytmHome() {
  try {
    const d = await ytm('browse', { browseId: 'FEmusic_home' });
    const secs = d?.contents?.singleColumnBrowseResultsRenderer?.tabs?.[0]
      ?.tabRenderer?.content?.sectionListRenderer?.contents || [];
    const songs = [];
    for (const sec of secs) {
      for (const item of (sec?.musicCarouselShelfRenderer?.contents || [])) {
        const r = item?.musicTwoRowItemRenderer;
        if (!r) continue;
        const id = r?.navigationEndpoint?.watchEndpoint?.videoId;
        if (!id) continue;
        const thumbs = r?.thumbnailRenderer?.musicThumbnailRenderer?.thumbnail?.thumbnails;
        const sub    = r?.subtitle?.runs || [];
        songs.push({ id, title: clean(r?.title?.runs?.[0]?.text || ''), artist: clean(sub[0]?.text || ''), thumb: sqThumb(thumbs, id) });
      }
    }
    return songs;
  } catch(e) { return []; }
}

async function ytmArtistSongs(browseId) {
  const d    = await ytm('browse', { browseId });
  const secs = d?.contents?.singleColumnBrowseResultsRenderer?.tabs?.[0]?.tabRenderer
    ?.content?.sectionListRenderer?.contents
    || d?.contents?.twoColumnBrowseResultsRenderer?.tabs?.[0]?.tabRenderer
        ?.content?.sectionListRenderer?.contents || [];
  const songs = [];
  for (const sec of secs) {
    const items = sec?.musicShelfRenderer?.contents || sec?.musicCarouselShelfRenderer?.contents || [];
    songs.push(...parseItems(items));
  }
  return songs;
}

async function ytmAlbumTracks(browseId) {
  // Try VL prefix for playlists
  const browseTarget = browseId.startsWith('PL') || browseId.startsWith('RD') ? 'VL' + browseId : browseId;
  const d = await ytm('browse', { browseId: browseTarget });
  // Album track listing is in secondaryContents for albums
  const secContents = d?.contents?.twoColumnBrowseResultsRenderer?.secondaryContents
    ?.sectionListRenderer?.contents
    || d?.contents?.singleColumnBrowseResultsRenderer?.tabs?.[0]?.tabRenderer
        ?.content?.sectionListRenderer?.contents || [];
  const songs = [];
  for (const sec of secContents) {
    const items = sec?.musicShelfRenderer?.contents || [];
    songs.push(...parseItems(items));
  }
  return songs;
}

function clean(t) {
  return (t || '').replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

// ── PLAYBACK ─────────────────────────────────────────────
function playSong(s){const ex=Q.findIndex(x=>x.id===s.id);ex!==-1?qi=ex:(Q.push(s),qi=Q.length-1);loadTrack();}
function queue(s){if(Q.some(x=>x.id===s.id)){toast('Already queued');return;}Q.push(s);toast('Added');if(Q.length===1){qi=0;loadTrack();}if(view==='queue')renderQueue();}
function loadTrack(){
  if(qi<0||qi>=Q.length)return;
  const s=Q[qi];cid=s.id;
  g('mtitle').textContent=s.title;g('martist').textContent=s.artist;
  g('ptitle').textContent=s.title;g('partist').textContent=s.artist;

  updLike();if(view==='queue')renderQueue();

}
function togPlay(){if(!ytOk||!cid)return;playing?ytPlayer.pauseVideo():ytPlayer.playVideo();}
function nextSong(){if(!Q.length)return;qi=shuf?randIdx():(qi+1)%Q.length;loadTrack();}
function prev(){if(!Q.length)return;if(ytOk&&ytPlayer.getCurrentTime()>3){ytPlayer.seekTo(0);return;}qi=qi>0?qi-1:Q.length-1;loadTrack();}
function randIdx(){if(Q.length<=1)return 0;let n=Math.floor(Math.random()*Q.length);return n===qi?(n+1)%Q.length:n;}
function togShuffle(){shuf=!shuf;g('csh').classList.toggle('on',shuf);toast(shuf?'Shuffle on':'Shuffle off');}
function togRepeat(){rep=(rep+1)%3;g('crp').innerHTML=['&#8635;','&#8635;','&#8635;&#185;'][rep];g('crp').classList.toggle('on',rep>0);toast(['Repeat off','Repeat all','Repeat one'][rep]);}
function setVol(e){const r=g('vtrack').getBoundingClientRect();vol=Math.round(Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100)));muted=false;applyVol();}
function togMute(){muted=!muted;applyVol();}
function applyVol(){const v=muted?0:vol;if(ytOk)ytPlayer.setVolume(v);g('vfill').style.width=v+'%';g('vic').innerHTML=v===0?'&#128263;':v<50?'&#128265;':'&#128264;';}
function togLike(){if(!cid)return;const s=Q[qi];if(!s)return;const i=liked.findIndex(x=>x.id===s.id);i===-1?(liked.push(s),toast('&#9829; Liked')):(liked.splice(i,1),toast('Removed'));localStorage.setItem('ml_'+(user?.email||'x'),JSON.stringify(liked));updLike();if(view==='liked')renderLiked();}
function updLike(){const on=cid&&liked.some(s=>s.id===cid);g('phrt').innerHTML=on?'&#9829;':'&#9825;';g('phrt').classList.toggle('on',on);}
function startTimer(){stopTimer();ptmr=setInterval(tick,500);}
function stopTimer(){if(ptmr){clearInterval(ptmr);ptmr=null;}}
function tick(){if(!ytOk||!playing)return;try{const c=ytPlayer.getCurrentTime()||0,t=ytPlayer.getDuration()||0,p=t>0?c/t*100:0;['pfill','mbf'].forEach(id=>g(id).style.width=p+'%');g('pcurr').textContent=fmt(c);g('ptotal').textContent=fmt(t);}catch(e){}}
function seek(e){if(!ytOk||!cid)return;const r=g('ptrack').getBoundingClientRect();ytPlayer.seekTo(((e.clientX-r.left)/r.width)*(ytPlayer.getDuration()||0));}
function updBtns(){const ic=playing?'&#9646;&#9646;':'&#9654;';['mpp','cpl'].forEach(id=>{const el=g(id);if(el)el.innerHTML=ic;});g('meq')?.classList.toggle('on',playing);}
function pullColor(url){const img=new Image();img.crossOrigin='anonymous';img.src=url+'?x='+Date.now();img.onload=()=>{try{const c=document.createElement('canvas');c.width=c.height=16;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,16,16);const d=ctx.getImageData(0,0,16,16).data;let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){const br=(d[i]+d[i+1]+d[i+2])/3;if(br>30&&br<220){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}}if(!n)return;const mx=Math.max(r/n,g/n,b/n),sc=190/mx;r=Math.round(Math.min(255,(r/n)*sc));g=Math.round(Math.min(255,(g/n)*sc));b=Math.round(Math.min(255,(b/n)*sc));const root=document.documentElement;root.style.setProperty('--red','rgb('+r+','+g+','+b+')');root.style.setProperty('--dr',r);root.style.setProperty('--dg',g);root.style.setProperty('--db',b);}catch(e){};};}

    const tl=el('div','tracklist');
    Q.forEach((s,i)=>{
      const div=el('div','track'+(i===qi?' active':''));div.onclick=()=>{qi=i;loadTrack();};
      if(s.thumb){const img=el('img','track-art');img.src=s.thumb;img.alt='';div.appendChild(img);}
      else{const ph=el('div','track-art-ph');ph.innerHTML='&#9834;';div.appendChild(ph);}
      const inf=el('div','track-info');inf.innerHTML='<div class="track-title">'+esc(s.title)+'</div><div class="track-artist">'+esc(s.artist)+'</div>';div.appendChild(inf);
      const rb=el('button','track-add');rb.textContent='\u2715';rb.onclick=e=>{e.stopPropagation();Q.splice(i,1);if(i<qi)qi--;renderQueue();};div.appendChild(rb);
      tl.appendChild(div);
    });
    sec.appendChild(tl);
  }
  fd.appendChild(sec);
}

function renderSearchEmpty(){g('feed').innerHTML='<div class="empty"><div class="empty-ic">&#9835;</div><div class="empty-title">Search for music</div><div class="empty-sub">Artists, songs and albums</div></div>';}

function onSearch(v){clearTimeout(stmr);if(!v.trim()){renderView();return;}stmr=setTimeout(()=>doSearch(v),380);}
async function doSearch(q){
  if(!q.trim())return;skel();
  try{
    const fd=g('feed');fd.innerHTML='';
    const{songs,artists,albums}=await ytmSearch(q);
    let ok=false;
    if(artists.length){fd.appendChild(mkCards('Artists',artists));ok=true;}
    if(albums.length){fd.appendChild(mkCards('Albums',albums));ok=true;}
    if(songs.length){fd.appendChild(mkRows('Songs',songs));ok=true;}
    if(!ok)showErr('Nothing found for "'+q+'"');
  }catch(e){showErr(e.message);}
}
function clearSearch(){g('sinp').value='';renderView();}

// ── BUILDERS ─────────────────────────────────────────────
function mkCards(title,items){
  const sec=el('div','sec');sec.appendChild(shdr(title));
  const strip=el('div','strip');
  items.forEach(s=>{
    const card=el('div','card');
    card.onclick=()=>{
      if(s.isArtist&&s.browseId){skel();ytmArtistSongs(s.browseId).then(r=>{const fd=g('feed');fd.innerHTML='';if(r.length)fd.appendChild(mkRows(s.title,r));else showErr('No official songs found');}).catch(e=>showErr(e.message));}
      else if(s.isAlbum&&s.browseId){skel();ytmAlbumTracks(s.browseId).then(r=>{const fd=g('feed');fd.innerHTML='';if(r.length)fd.appendChild(mkRows(s.title,r));else showErr('No official tracks found');}).catch(e=>showErr(e.message));}
      else playSong(s);
    };
    const art=el('div','card-img');
    if(s.thumb){const img=el('img');img.src=s.thumb;img.alt='';img.loading='lazy';art.appendChild(img);}
    else{const ph=el('div','card-img-ph');ph.innerHTML='&#9834;';art.appendChild(ph);}
    if(!s.isArtist&&!s.isAlbum){const ov=el('div','card-ov');ov.innerHTML='<div class="card-play">&#9654;</div>';art.appendChild(ov);}
    if(s.id===cid){const np=el('div','card-now');np.textContent='Playing';art.appendChild(np);}
    card.appendChild(art);
    const t=el('div','card-title');t.textContent=s.title;card.appendChild(t);
    const a=el('div','card-sub');a.textContent=s.isArtist?'Artist':s.artist;card.appendChild(a);
    strip.appendChild(card);
  });
  sec.appendChild(strip);return sec;
}

function mkRows(title,items){
  const sec=el('div','sec');
  const h=shdr(title);
  const ct=el('span');ct.style.cssText='font-size:.72rem;color:var(--t3)';ct.textContent=items.length;
  h.appendChild(ct);sec.appendChild(h);
  const tl=el('div','tracklist');
  items.forEach(s=>{
    const div=el('div','track'+(s.id===cid?' active':''));div.onclick=()=>playSong(s);
    if(s.thumb){const img=el('img','track-art');img.src=s.thumb;img.alt='';img.loading='lazy';div.appendChild(img);}
    else{const ph=el('div','track-art-ph');ph.innerHTML='&#9834;';div.appendChild(ph);}
    const inf=el('div','track-info');inf.innerHTML='<div class="track-title">'+esc(s.title)+'</div><div class="track-artist">'+esc(s.artist)+'</div>';div.appendChild(inf);
    const btn=el('button','track-add');btn.textContent='+';btn.title='Queue';btn.onclick=e=>{e.stopPropagation();queue(s);};div.appendChild(btn);
    tl.appendChild(div);
  });
  sec.appendChild(tl);return sec;
}

function shdr(title){const h=el('div','sec-hdr');const t=el('span','sec-label');t.textContent=title;h.appendChild(t);return h;}
function emptyEl(ic,t,s){const d=el('div','empty');d.innerHTML='<div class="empty-ic">'+ic+'</div><div class="empty-title">'+t+'</div><div class="empty-sub">'+s+'</div>';return d;}
function skel(){g('feed').innerHTML='<div class="skwrap"><div class="sktitle"></div><div class="skcards">'+Array(5).fill(0).map(()=>'<div class="skc"><div class="skca"></div><div class="skcl"></div><div class="skcl2"></div></div>').join('')+'</div><div class="skrows">'+Array(5).fill(0).map(()=>'<div class="skr"><div class="skth"></div><div class="skl"><div class="skl1"></div><div class="skl2"></div></div></div>').join('')+'</div></div>';}
function showErr(m){g('feed').innerHTML='<div class="empty"><div class="empty-ic">&#9888;</div><div class="empty-title">Something went wrong</div><div class="empty-sub">'+esc(m)+'</div></div>';}

// ── ACCOUNT ──────────────────────────────────────────────
function togMenu(){mopen=!mopen;g('amenu').classList.toggle('on',mopen);if(mopen)document.addEventListener('click',closeMenu,true);}
function closeMenu(e){if(!g('amenu').contains(e.target)&&e.target!==g('uav')){mopen=false;g('amenu').classList.remove('on');document.removeEventListener('click',closeMenu,true);}}
function toast(m){const d=el('div','toast');d.innerHTML=m;g('tw').appendChild(d);setTimeout(()=>d.remove(),2600);}
document.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;if(e.code==='Space'){e.preventDefault();togPlay();}if(e.code==='ArrowRight')nextSong();if(e.code==='ArrowLeft')prev();if(e.code==='KeyL')togLike();if(e.code==='Escape')closePlayer();});

// ── HELPERS ──────────────────────────────────────────────
const g  =id=>document.getElementById(id);
const el =(tag,cls='')=>{const e=document.createElement(tag);if(cls)e.className=cls;return e;};
const fmt=s=>{s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── INIT ─────────────────────────────────────────────────
(function(){
  const u=localStorage.getItem('mu'),t=localStorage.getItem('mt'),exp=parseInt(localStorage.getItem('mte')||'0');
  if(u&&t&&Date.now()<exp){try{user=JSON.parse(u);tok=t;liked=JSON.parse(localStorage.getItem('ml_'+user.email)||'[]');enterApp();return;}catch(e){}}
  localStorage.removeItem('mt');localStorage.removeItem('mte');
  const wait=setInterval(()=>{if(window.google?.accounts?.id){clearInterval(wait);initGoogle();}},80);
})();
</script>
