<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>melo. v4</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #060608;
  --c1:   #0f0f12;
  --c2:   #161619;
  --c3:   #1e1e22;
  --c4:   #2a2a30;
  --t:    #f0f0f2;
  --t2:   #888890;
  --t3:   #444450;
  --acc:  #ff4d4d;
  --dr:255;--dg:77;--db:77;
  --nh:   64px;
  --safe: env(safe-area-inset-bottom, 0px);
  --itop: env(safe-area-inset-top, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: Figtree, sans-serif; background: var(--bg); color: var(--t); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 0; }

/* ── AUTH ─────────────────────────────────────────── */
#auth {
  position: fixed; inset: 0; z-index: 900;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px; padding: 40px 32px;
  transition: opacity .35s, transform .35s;
}
#auth.hide { opacity: 0; pointer-events: none; transform: scale(.97); }
.auth-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 50% at 50% 0%,
    rgba(255,77,77,.09) 0%, transparent 65%);
}
.a-logo { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
.a-icon {
  width: 76px; height: 76px; border-radius: 22px;
  background: linear-gradient(145deg, #200a0a, #0e0810);
  border: 1px solid rgba(255,77,77,.15);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 48px rgba(255,77,77,.1);
}
.a-name { font-size: 2.2rem; font-weight: 900; letter-spacing: -.06em; }
.a-name em { color: var(--acc); font-style: normal; }
.a-sub { font-size: .88rem; color: var(--t2); margin-top: -6px; }
#g-btn { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.grant-btn {
  padding: 13px 28px; background: var(--acc); color: #fff;
  border: none; border-radius: 13px;
  font-family: Figtree, sans-serif; font-size: .93rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(255,77,77,.28);
  transition: opacity .15s, transform .12s;
}
.grant-btn:hover { opacity: .88; }
.grant-btn:active { transform: scale(.96); }
.a-note { font-size: .76rem; color: var(--t3); text-align: center; max-width: 240px; line-height: 1.6; }

/* ── APP ──────────────────────────────────────────── */
#app { height: 100vh; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity .35s; }
#app.on { opacity: 1; pointer-events: all; }

/* ── TOPBAR ───────────────────────────────────────── */
.tb {
  flex-shrink: 0;
  padding: calc(12px + var(--itop)) 16px 10px;
  display: flex; align-items: center; gap: 10px;
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.tb-logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -.05em; flex-shrink: 0; cursor: pointer; }
.tb-logo em { color: var(--acc); font-style: normal; }
.tb-bar {
  flex: 1; display: flex; align-items: center; gap: 8px;
  background: var(--c2); border-radius: 11px;
  padding: 9px 12px; border: 1px solid transparent;
  transition: border-color .15s;
}
.tb-bar:focus-within { border-color: rgba(255,255,255,.1); }
.tb-ic { font-size: .8rem; color: var(--t3); flex-shrink: 0; }
.tb-bar input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--t); font-family: Figtree, sans-serif;
  font-size: .87rem; min-width: 0;
}
.tb-bar input::placeholder { color: var(--t3); }
.tb-x { background: none; border: none; color: var(--t3); cursor: pointer; font-size: .78rem; display: none; padding: 2px; }
.tb-bar input:not(:placeholder-shown) ~ .tb-x { display: block; }
.tb-av {
  width: 30px; height: 30px; border-radius: 50%;
  object-fit: cover; cursor: pointer;
  background: var(--c3); flex-shrink: 0;
  border: 1.5px solid var(--c4);
}

/* ── SCROLL ───────────────────────────────────────── */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }

/* ── SECTIONS ─────────────────────────────────────── */
.sec { padding: 18px 16px 6px; }
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sh-t { font-size: .96rem; font-weight: 700; letter-spacing: -.02em; }
.sh-s { font-size: .73rem; color: var(--t3); cursor: pointer; }
.sh-s:hover { color: var(--t2); }

/* ── CARDS ────────────────────────────────────────── */
.hscroll {
  display: flex; gap: 12px;
  overflow-x: auto; padding: 0 16px 4px; margin: 0 -16px;
  scrollbar-width: none;
}
.hscroll::-webkit-scrollbar { display: none; }
.card { flex-shrink: 0; width: 136px; cursor: pointer; }
.card:active { opacity: .7; }
.card-img {
  width: 136px; height: 136px; min-height: 136px; border-radius: 11px;
  overflow: hidden; background: var(--c2);
  position: relative; margin-bottom: 9px;
  flex-shrink: 0; aspect-ratio: 1/1;
}
.card-img img {
  width: 136px; height: 136px; object-fit: cover;
  display: block; transition: transform .22s;
  aspect-ratio: 1/1;
}
.card:hover .card-img img { transform: scale(1.04); }
.card-img-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; }
.card-ov {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.38);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .15s;
}
.card:hover .card-ov { opacity: 1; }
.card-pb {
  width: 40px; height: 40px; background: #fff;
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: .95rem; color: #000;
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
}
.card-np {
  position: absolute; top: 7px; right: 7px;
  background: var(--acc); border-radius: 100px;
  padding: 2px 8px; font-size: .53rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; color: #fff;
}
.card-name { font-size: .8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.card-by { font-size: .71rem; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── ROWS ─────────────────────────────────────────── */
.rows { display: flex; flex-direction: column; }
.row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 0; cursor: pointer;
  transition: opacity .12s;
}
.row:active { opacity: .6; }
.row.np .row-name { color: var(--acc); }
.row-img {
  width: 50px; height: 50px; min-width: 50px; min-height: 50px;
  border-radius: 9px; object-fit: cover;
  flex-shrink: 0; background: var(--c2);
  display: block; aspect-ratio: 1/1;
}
.row-img-ph {
  width: 50px; height: 50px; border-radius: 9px;
  background: var(--c2); display: flex; align-items: center;
  justify-content: center; font-size: 1.3rem; flex-shrink: 0;
}
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: .87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-by { font-size: .75rem; color: var(--t2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-btn {
  background: none; border: none; color: var(--t3);
  font-size: 1.2rem; cursor: pointer; padding: 6px;
  flex-shrink: 0; border-radius: 50%; line-height: 1;
  transition: color .12s;
}
.row-btn:hover { color: var(--acc); }

/* ── MINI PLAYER ──────────────────────────────────── */
.mini {
  flex-shrink: 0; margin: 0 10px 6px;
  background: var(--c1); border: 1px solid rgba(255,255,255,.07);
  border-radius: 16px; padding: 10px 12px;
  display: flex; align-items: center; gap: 11px;
  cursor: pointer; position: relative; overflow: hidden;
}
.mini::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(120deg, rgba(var(--dr),var(--dg),var(--db),.07) 0%, transparent 45%);
  transition: background .5s;
}
.mini-aw { flex-shrink: 0; position: relative; width: 44px; height: 44px; }
.mini-art { width: 44px; height: 44px; border-radius: 9px; object-fit: cover; display: block; background: var(--c3); }
.mini-ph { width: 44px; height: 44px; border-radius: 9px; background: var(--c3); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.mini-eq {
  position: absolute; inset: 0; border-radius: 9px;
  background: rgba(0,0,0,.5); display: flex;
  align-items: center; justify-content: center;
  gap: 2px; opacity: 0; transition: opacity .18s;
}
.mini-eq.on { opacity: 1; }
.eqb { width: 3px; background: var(--acc); border-radius: 2px; animation: eq .8s ease infinite; transition: background .5s; }
.eqb:nth-child(1){height:9px;animation-delay:0s}
.eqb:nth-child(2){height:15px;animation-delay:.12s}
.eqb:nth-child(3){height:7px;animation-delay:.28s}
.eqb:nth-child(4){height:13px;animation-delay:.08s}
@keyframes eq { 0%,100%{transform:scaleY(.3)} 50%{transform:scaleY(1)} }
.mini-info { flex: 1; min-width: 0; }
.mini-name { font-size: .86rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-by { font-size: .73rem; color: var(--t2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-btns { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.mb {
  background: none; border: none; color: var(--t2);
  font-size: .92rem; cursor: pointer; padding: 7px;
  border-radius: 50%; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.mb:hover { color: var(--t); background: rgba(255,255,255,.07); }
.mb-play {
  width: 36px; height: 36px; background: var(--t);
  color: var(--bg) !important; border-radius: 50%;
  font-size: .8rem; transition: transform .1s;
}
.mb-play:active { transform: scale(.9); }
.mini-prog { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,.06); }
.mini-pbar { height: 100%; background: var(--acc); transition: width .4s linear, background .5s; }

/* ── BOTTOM NAV ───────────────────────────────────── */
.nav {
  flex-shrink: 0;
  display: flex; align-items: center;
  height: calc(var(--nh) + var(--safe));
  padding-bottom: var(--safe);
  background: var(--c1);
  border-top: 1px solid rgba(255,255,255,.06);
}
.ni { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 7px 0; color: var(--t3); transition: color .14s; }
.ni.on { color: var(--acc); }
.ni-ic { font-size: 1.15rem; line-height: 1; }
.ni-lb { font-size: .56rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }

/* ── FULL PLAYER ──────────────────────────────────── */
.fp {
  position: fixed; inset: 0; z-index: 300;
  background: var(--bg);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .36s cubic-bezier(.32, 0, .15, 1);
  /* No overflow hidden — let it breathe */
}
.fp.on { transform: translateY(0); }
.fp-tint {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 100% 45% at 50% 0%,
    rgba(var(--dr),var(--dg),var(--db),.14) 0%, transparent 55%);
  transition: background .6s;
}

/* Header */
.fp-hdr {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(14px + var(--itop)) 22px 10px;
  position: relative; z-index: 1;
}
.fp-hbtn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.07); border: none;
  color: var(--t2); font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .14s;
}
.fp-hbtn:hover { background: rgba(255,255,255,.12); }
.fp-label { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--t3); }

/* Art */
.fp-art-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 10px 36px; position: relative; z-index: 1;
  min-height: 0; /* prevent overflow */
}
.fp-art-frame {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.fp-glow {
  position: absolute; inset: -25%;
  background: radial-gradient(circle, rgba(var(--dr),var(--dg),var(--db),.4) 0%, transparent 65%);
  filter: blur(20px); pointer-events: none; z-index: 0;
  transition: background .6s;
}
.fp-ring {
  position: absolute; inset: -3px; border-radius: 27px;
  background: conic-gradient(
    rgba(var(--dr),var(--dg),var(--db),.85) 0deg,
    rgba(var(--dr),var(--dg),var(--db),.12) 90deg,
    rgba(var(--dr),var(--dg),var(--db),.8) 180deg,
    rgba(var(--dr),var(--dg),var(--db),.1) 270deg,
    rgba(var(--dr),var(--dg),var(--db),.85) 360deg
  );
  z-index: 1; transition: background .6s;
  animation: ringr 6s linear infinite;
}
@keyframes ringr { to { transform: rotate(360deg); } }
.fp-ring-gap { position: absolute; inset: 1.5px; border-radius: 25.5px; background: var(--bg); z-index: 2; }
.fp-img {
  width: calc(100vw - 72px);
  max-width: 310px;
  aspect-ratio: 1/1;
  border-radius: 24px; object-fit: cover; display: block;
  position: relative; z-index: 3;
  box-shadow: 0 16px 56px rgba(0,0,0,.7);
}
.fp-img-ph {
  width: calc(100vw - 72px); max-width: 310px;
  aspect-ratio: 1/1;
  border-radius: 24px; background: var(--c2);
  display: flex; align-items: center; justify-content: center;
  font-size: 4.5rem; position: relative; z-index: 3;
}

/* Info */
.fp-info {
  flex-shrink: 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 6px 24px 4px; position: relative; z-index: 1;
}
.fp-name { font-size: 1.22rem; font-weight: 800; letter-spacing: -.03em; line-height: 1.2; margin-bottom: 4px; }
.fp-by { font-size: .88rem; color: var(--t2); font-weight: 500; }
.fp-hrt {
  background: none; border: none; font-size: 1.35rem;
  cursor: pointer; padding: 4px 0 4px 10px;
  color: var(--t3); flex-shrink: 0; margin-top: 2px;
  transition: color .18s;
}
.fp-hrt.on { color: var(--acc); }

/* Progress */
.fp-prog { flex-shrink: 0; padding: 10px 24px 6px; position: relative; z-index: 1; }
.fp-track {
  height: 3px; background: rgba(255,255,255,.1);
  border-radius: 2px; cursor: pointer; margin-bottom: 7px;
  position: relative; transition: height .15s;
}
.fp-track:hover { height: 5px; }
.fp-fill {
  height: 100%; border-radius: 2px;
  background: var(--acc); pointer-events: none;
  transition: width .12s linear, background .5s;
}
.fp-times { display: flex; justify-content: space-between; font-size: .69rem; color: var(--t3); font-weight: 500; }

/* Controls */
.fp-ctrls {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 18px 10px; position: relative; z-index: 1;
}
.fc {
  background: none; border: none; color: var(--t3);
  font-size: 1.1rem; cursor: pointer; padding: 8px;
  border-radius: 50%; width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  transition: all .14s;
}
.fc:hover { color: var(--t); background: rgba(255,255,255,.07); }
.fc.on { color: var(--acc); }
.fc-skip { font-size: 1.35rem; color: var(--t2); width: 50px; height: 50px; }
.fc-skip:hover { color: var(--t); }
.fc-play {
  width: 60px; height: 60px;
  background: var(--t); color: var(--bg) !important;
  font-size: 1.25rem; border-radius: 50%;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  transition: transform .1s;
}
.fc-play:active { transform: scale(.93); }

/* Volume */
.fp-vol {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 24px 8px; position: relative; z-index: 1;
}
.fp-vic { font-size: .88rem; color: var(--t3); cursor: pointer; flex-shrink: 0; transition: color .13s; }
.fp-vic:hover { color: var(--t2); }
.fp-vtrack { flex: 1; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; cursor: pointer; overflow: hidden; }
.fp-vfill { height: 100%; background: rgba(255,255,255,.28); border-radius: 2px; pointer-events: none; transition: width .05s; }

/* ── ACCOUNT MENU ─────────────────────────────────── */
.acct {
  position: fixed; top: 58px; right: 14px; z-index: 400;
  background: var(--c2); border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px; padding: 6px; min-width: 188px;
  box-shadow: 0 8px 28px rgba(0,0,0,.6);
  opacity: 0; pointer-events: none;
  transform: translateY(-6px) scale(.97);
  transition: all .15s;
}
.acct.on { opacity: 1; pointer-events: all; transform: none; }
.acct-top { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.07); margin-bottom: 4px; }
.acct-av { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: var(--c3); }
.acct-name { font-size: .81rem; font-weight: 600; }
.acct-email { font-size: .69rem; color: var(--t2); }
.acct-row { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 9px; font-size: .81rem; cursor: pointer; color: var(--t2); transition: all .12s; }
.acct-row:hover { background: rgba(255,255,255,.05); color: var(--t); }
.acct-row.red { color: var(--acc); }

/* ── EMPTY / SKELETON ─────────────────────────────── */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 52px 24px; text-align: center; gap: 10px; }
.e-ic { font-size: 2.6rem; opacity: .18; }
.e-t { font-size: .98rem; font-weight: 700; color: var(--t2); }
.e-s { font-size: .8rem; color: var(--t3); line-height: 1.65; max-width: 230px; }
.sk-wrap { padding: 18px 16px 6px; }
.sk-title { height: 18px; width: 140px; background: var(--c2); border-radius: 6px; margin-bottom: 16px; animation: sk 1.4s ease infinite; }
.sk-cards { display: flex; gap: 12px; padding: 0 16px; overflow: hidden; margin: 0 -16px; }
.sk-c { flex-shrink: 0; }
.sk-ca { width: 136px; height: 136px; border-radius: 11px; background: var(--c2); margin-bottom: 8px; animation: sk 1.4s ease infinite; }
.sk-cl { height: 10px; background: var(--c2); border-radius: 5px; margin-bottom: 5px; animation: sk 1.4s ease infinite; }
.sk-cl2 { height: 9px; width: 58%; background: var(--c2); border-radius: 5px; animation: sk 1.4s ease infinite; }
.sk-rows { padding: 0 16px; margin-top: 20px; }
.sk-r { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
.sk-th { width: 50px; height: 50px; border-radius: 9px; background: var(--c2); flex-shrink: 0; animation: sk 1.4s ease infinite; }
.sk-l { flex: 1; }
.sk-l1 { height: 11px; background: var(--c2); border-radius: 5px; margin-bottom: 6px; animation: sk 1.4s ease infinite; }
.sk-l2 { height: 9px; width: 52%; background: var(--c2); border-radius: 5px; animation: sk 1.4s ease infinite; }
@keyframes sk { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── TOAST ────────────────────────────────────────── */
.tw { position: fixed; bottom: calc(var(--nh) + 66px + 14px); left: 50%; transform: translateX(-50%); z-index: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; width: max-content; max-width: 86vw; }
.toast { background: var(--c3); border: 1px solid rgba(255,255,255,.09); border-radius: 100px; padding: 8px 18px; font-size: .79rem; font-weight: 500; white-space: nowrap; animation: tp .22s cubic-bezier(.34,1.56,.64,1); }
@keyframes tp { from{opacity:0;transform:scale(.82)translateY(6px)} to{opacity:1;transform:none} }

@media(min-width:600px){ .fp-img,.fp-img-ph{max-width:360px;max-height:360px} }
</style>
</head>
<body>
<div id="ytp" style="position:fixed;top:-1px;left:-1px;width:1px;height:1px;opacity:0;pointer-events:none"></div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-glow"></div>
  <div class="a-logo">
    <div class="a-icon">
      <svg width="34" height="26" viewBox="0 0 68 50" fill="none">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff6060" stop-opacity=".5"/><stop offset="45%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#ff2424" stop-opacity=".6"/></linearGradient></defs>

<script>

// ── YOUTUBE MUSIC INNERTUBE API ──────────────────────────
// Uses music.youtube.com internal API — returns real YTM results
const YTM_KEY = 'AIzaSyC9XL3ZjWddXya6X74dJoCTL-WEYFDNX30';
const YTM_CTX = {client:{clientName:'WEB_REMIX',clientVersion:'1.20240101.01.00',hl:'en',gl:'US'}};

async function ytm(endpoint, body){
  const h = {'Content-Type':'application/json','X-Goog-Api-Format-Version':'1',
    'User-Agent':'Mozilla/5.0','Origin':'https://music.youtube.com','Referer':'https://music.youtube.com/'};
  if(tok) h['Authorization']='Bearer '+tok;
  const r = await fetch('https://music.youtube.com/youtubei/v1/'+endpoint+'?key='+YTM_KEY,
    {method:'POST',headers:h,body:JSON.stringify({context:YTM_CTX,...body})});
  if(!r.ok) throw new Error('YTM error '+r.status);
  return r.json();
}

function bestThumb(thumbs){
  if(!thumbs||!thumbs.length) return '';
  const t = thumbs.sort((a,b)=>(b.width||0)-(a.width||0))[0];
  // Force square crop via URL params
  return (t.url||'').replace(/=w\d+-h\d+.*/,'=w400-h400-l90-rj').replace(/\/hq720\.jpg.*/,'/maxresdefault.jpg');
}

function parseShelf(contents){
  const songs=[], artists=[], albums=[];
  (contents||[]).forEach(sec=>{
    const items = sec?.musicShelfRenderer?.contents
      || sec?.musicCarouselShelfRenderer?.contents || [];
    const shelfTitle = (sec?.musicShelfRenderer?.title?.runs?.[0]?.text
      || sec?.musicCarouselShelfRenderer?.header?.musicCarouselShelfBasicHeaderRenderer?.title?.runs?.[0]?.text||'').toLowerCase();

    items.forEach(item=>{
      const r = item?.musicResponsiveListItemRenderer || item?.musicTwoRowItemRenderer;
      if(!r) return;
      const vidId = r?.overlay?.musicItemThumbnailOverlayRenderer?.content
        ?.musicPlayButtonRenderer?.playNavigationEndpoint?.watchEndpoint?.videoId
        || r?.flexColumns?.[0]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs?.[0]
            ?.navigationEndpoint?.watchEndpoint?.videoId
        || r?.navigationEndpoint?.watchEndpoint?.videoId;
      const browseId = r?.navigationEndpoint?.browseEndpoint?.browseId;
      const playlistId = r?.navigationEndpoint?.watchEndpoint?.playlistId
        || r?.navigationEndpoint?.browseEndpoint?.browseId;
      const thumbs = r?.thumbnail?.musicThumbnailRenderer?.thumbnail?.thumbnails
        || r?.thumbnailRenderer?.musicThumbnailRenderer?.thumbnail?.thumbnails || [];
      const thumb = bestThumb(thumbs) || (vidId?'https://i.ytimg.com/vi/'+vidId+'/hqdefault.jpg':'');
      const title = r?.flexColumns?.[0]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs?.[0]?.text
        || r?.title?.runs?.[0]?.text || '';
      const sub = (r?.flexColumns?.[1]?.musicResponsiveListItemFlexColumnRenderer?.text?.runs
        || r?.subtitle?.runs||[]).map(x=>x.text).join('');

      if(vidId){
        songs.push({id:vidId,title,artist:sub.replace(/\s*•.*/,'').trim(),thumb});
      } else if(browseId && (shelfTitle.includes('artist') || browseId.startsWith('UC'))){
        artists.push({id:browseId,title,artist:'Artist',thumb,isArtist:true,browseId});
      } else if(playlistId || shelfTitle.includes('album') || shelfTitle.includes('ep')){
        albums.push({id:playlistId||browseId,title,artist:sub.replace(/\s*•.*/,'').trim(),thumb,isPlaylist:true,playlistId:playlistId||browseId});
      }
    });
  });
  return {songs,artists,albums};
}

async function ytmSearch(q){
  // params = Songs filter for YTM
  const data = await ytm('search',{query:q,params:'EgWKAQIIAWoKEAkQBRAKEAMQBA%3D%3D'});
  const contents = data?.contents?.tabbedSearchResultsRenderer?.tabs?.[0]?.tabRenderer
    ?.content?.sectionListRenderer?.contents
    || data?.contents?.sectionListRenderer?.contents || [];

}

async function ytmHome(){

      });

async function getArtistSongs(browseId){

}

// ── YT IFRAME PLAYER ──────────────────────────────────
window.onYouTubeIframeAPIReady = ()=>{
  ytp = new YT.Player('ytp', {
    height:'1', width:'1',
    playerVars:{autoplay:0, controls:0, playsinline:1},
    events:{
      onReady: ()=>{ ytOk=true; ytp.setVolume(vol); },
      onStateChange: e=>{
        const S=YT.PlayerState;
        if(e.data===S.PLAYING){ playing=true;  updBtns(); startTimer(); }
        if(e.data===S.PAUSED) { playing=false; updBtns(); }
        if(e.data===S.ENDED)  { onEnd(); }
        if(e.data===S.BUFFERING){ ['mplay','fcpl'].forEach(id=>ge(id).textContent='...'); }
      },
      onError: ()=>{ toast('Playback error'); nextT(); }
    }
  });
};
const yts = document.createElement('script');
yts.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(yts);

function onEnd(){
  if(rep===2){ ytp.seekTo(0); ytp.playVideo(); }
  else if(rep===1||qi<Q.length-1){ nextT(); }
  else { playing=false; updBtns(); stopTimer(); }
}

// ── PLAYBACK ──────────────────────────────────────────
function playSong(song){
  const ex = Q.findIndex(s=>s.id===song.id);
  if(ex!==-1){ qi=ex; } else { Q.push(song); qi=Q.length-1; }
  loadTrack();
}

function addToQ(song){
  if(Q.some(s=>s.id===song.id)){ toast('Already in queue'); return; }
  Q.push(song); toast('Added to queue');
  if(Q.length===1){ qi=0; loadTrack(); }
  if(view==='queue') renderQueue();
}

function loadTrack(){
  if(qi<0||qi>=Q.length) return;
  const s = Q[qi]; cid = s.id;
  ge('mname').textContent = s.title; ge('mby').textContent = s.artist;
  ge('fpname').textContent = s.title; ge('fpby').textContent = s.artist;
  document.title = s.title+' — melo.';
  // Art
  const ma=ge('mart'), mph=ge('mph'), fi=ge('fpimg'), fp=ge('fpph');
  if(s.thumb){
    ma.src=s.thumb; ma.style.display='block'; mph.style.display='none';
    fi.src=s.thumb; fi.style.display='block'; fp.style.display='none';
    pullColor(s.thumb);
  }
  updLike();
  if(view==='queue') renderQueue();
  if(ytOk){ ytp.loadVideoById(s.id); playing=true; updBtns(); }
}

function togPlay(){ if(!ytOk||!cid)return; playing?ytp.pauseVideo():ytp.playVideo(); }
function nextT(){ if(!Q.length)return; qi=shuf?rnd():(qi+1)%Q.length; loadTrack(); }
function prevT(){ if(!Q.length)return; if(ytOk&&ytp.getCurrentTime()>3){ytp.seekTo(0);return;} qi=qi>0?qi-1:Q.length-1; loadTrack(); }
function rnd(){ if(Q.length<=1)return 0; let n=Math.floor(Math.random()*Q.length); return n===qi?(n+1)%Q.length:n; }

function togShuf(){ shuf=!shuf; ge('fcsh').classList.toggle('on',shuf); toast(shuf?'Shuffle on':'Shuffle off'); }
function togRep(){
  rep=(rep+1)%3;
  ge('fcrp').textContent = rep===2?'&#8635;&#185;':'&#8635;';
  ge('fcrp').classList.toggle('on',rep>0);

}
function setVol(e){ const r=ge('fpvt').getBoundingClientRect(); vol=Math.round(Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100))); muted=false; applyVol(); }
function togMute(){ muted=!muted; applyVol(); }
function applyVol(){
  const v=muted?0:vol; if(ytOk)ytp.setVolume(v);
  ge('fpvf').style.width=v+'%';
  ge('fpvi').innerHTML=v===0?'&#128263;':v<50?'&#128265;':'&#128264;';
}
function togLike(){
  if(!cid) return;
  const s=Q[qi]; if(!s) return;
  const i=liked.findIndex(x=>x.id===s.id);
  i===-1?(liked.push(s),toast('&#9829; Liked')):(liked.splice(i,1),toast('Removed'));
  localStorage.setItem('ml_'+(user?.email||'x'), JSON.stringify(liked));
  updLike(); if(view==='liked') renderLiked();
}
function updLike(){
  const on = cid&&liked.some(s=>s.id===cid);

  ge('fphrt').classList.toggle('on',on);

// ── PROGRESS ──────────────────────────────────────────
function startTimer(){ stopTimer(); ptmr=setInterval(tick,500); }
function stopTimer(){ if(ptmr){clearInterval(ptmr);ptmr=null;} }
function tick(){
  if(!ytOk||!playing) return;
  try{
    const c=ytp.getCurrentTime()||0, t=ytp.getDuration()||0, p=t>0?c/t*100:0;
    ge('fpfill').style.width=p+'%';
    ge('mpbar').style.width=p+'%';
    ge('fpcur').textContent=fmt(c);
    ge('fptot').textContent=fmt(t);
  }catch(e){}
}
function seek(e){
  if(!ytOk||!cid) return;
  const r=ge('fptr').getBoundingClientRect();
  ytp.seekTo(((e.clientX-r.left)/r.width)*(ytp.getDuration()||0));
}
function updBtns(){
  const ic = playing?'&#9646;&#9646;':'&#9654;';
  ge('mplay').innerHTML=ic; ge('fcpl').innerHTML=ic;
  ge('meq').classList.toggle('on',playing);
}

// ── DYNAMIC COLOR ─────────────────────────────────────
function pullColor(url){
  const img=new Image(); img.crossOrigin='anonymous';
  img.src=url+'?t='+Date.now();
  img.onload=()=>{
    try{
      const c=document.createElement('canvas'); c.width=c.height=16;
      const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,16,16);
      const d=ctx.getImageData(0,0,16,16).data;
      let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){
        const br=(d[i]+d[i+1]+d[i+2])/3;
        if(br>30&&br<220){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
      }
      if(!n) return;
      const mx=Math.max(r/n,g/n,b/n), sc=200/mx;
      r=Math.round(Math.min(255,(r/n)*sc));
      g=Math.round(Math.min(255,(g/n)*sc));
      b=Math.round(Math.min(255,(b/n)*sc));
      const root=document.documentElement;
      root.style.setProperty('--acc',`rgb(${r},${g},${b})`);
      root.style.setProperty('--dr',r);
      root.style.setProperty('--dg',g);
      root.style.setProperty('--db',b);
    }catch(e){}
  };
}

    const g = h<12?'Good morning':h<18?'Good afternoon':'Good evening';
    const nm = user?.name?.split(' ')[0]||'';
    const top = document.createElement('div'); top.className='sec';
    top.innerHTML='<div style="font-size:1.55rem;font-weight:900;letter-spacing:-.04em;margin-bottom:3px">'+g+(nm?', '+nm:'')+'.</div>'
      +'<div style="font-size:.82rem;color:var(--t2)">Here is what is playing</div>';
    sa.appendChild(top);
    if(liked.length) sa.appendChild(mkCards('Liked Songs', liked.slice(0,10)));
    if(a.status==='fulfilled'&&a.value.length) sa.appendChild(mkCards('For You', a.value));
    if(b.status==='fulfilled'&&b.value.length) sa.appendChild(mkCards('Top Charts', b.value));
    if(c.status==='fulfilled'&&c.value.length) sa.appendChild(mkRows('New Drops', c.value));
  }catch(e){ showErr(e.message); }
}

// ── LIBRARY ───────────────────────────────────────────
async function renderLib(){
  skel();
  try{
    const d = await ytq(YTM+'/playlists?part=snippet,contentDetails&mine=true&maxResults=20');
    const sa=ge('scroll'); sa.innerHTML='';
    const sec=document.createElement('div'); sec.className='sec';
    const sh=document.createElement('div'); sh.className='sh';
    sh.innerHTML='<span class="sh-t">Your Library</span>';
    sec.appendChild(sh);
    if(!d.items?.length){
      const e=document.createElement('div'); e.className='empty';
      e.innerHTML='<div class="e-ic">&#8862;</div><div class="e-t">No playlists</div><div class="e-s">Create playlists on YouTube Music and they will show here.</div>';
      sec.appendChild(e);
    } else {
      d.items.forEach(pl=>{
        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:12px;padding:11px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)';
        row.onclick=()=>openPl(pl.id,pl.snippet.title);
        const th=pl.snippet.thumbnails?.high?.url||pl.snippet.thumbnails?.default?.url;
        if(th){
          const img=document.createElement('img');
          img.style.cssText='width:50px;height:50px;border-radius:9px;object-fit:cover;flex-shrink:0';
          img.src=th; row.appendChild(img);
        } else {
          const ph=document.createElement('div');
          ph.style.cssText='width:50px;height:50px;border-radius:9px;background:var(--c2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem';
          ph.textContent='\u266A'; row.appendChild(ph);
        }
        const inf=document.createElement('div'); inf.style.cssText='flex:1;min-width:0';
        inf.innerHTML='<div style="font-size:.87rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(pl.snippet.title)+'</div>'
          +'<div style="font-size:.73rem;color:var(--t2);margin-top:2px">'+(pl.contentDetails?.itemCount||0)+' songs</div>';
        row.appendChild(inf);
        const arr=document.createElement('span'); arr.style.cssText='color:var(--t3);font-size:.9rem'; arr.textContent='›';
        row.appendChild(arr);
        sec.appendChild(row);
      });
    }
    sa.appendChild(sec);
  }catch(e){ showErr(e.message); }
}

async function openPl(id,title){
  skel();
  try{
    const songs = await getPlaylistSongs(id);
    const sa=ge('scroll'); sa.innerHTML='';
    if(songs.length) sa.appendChild(mkRows(title,songs));
    else showErr('No tracks found in this playlist');
  }catch(e){ showErr(e.message); }
}

function renderLiked(){
  const sa=ge('scroll'); sa.innerHTML='';
  if(!liked.length){
    sa.innerHTML='<div class="empty"><div class="e-ic">&#9825;</div><div class="e-t">No liked songs</div><div class="e-s">Tap the heart while a song plays.</div></div>';
  } else { sa.appendChild(mkRows('Liked Songs', liked)); }
}

function renderQueue(){
  const sa=ge('scroll'); sa.innerHTML='';
  const sec=document.createElement('div'); sec.className='sec';
  const sh=document.createElement('div'); sh.className='sh';
  const ht=document.createElement('span'); ht.className='sh-t'; ht.textContent='Queue'; sh.appendChild(ht);
  if(Q.length){
    const cl=document.createElement('span'); cl.className='sh-s'; cl.textContent='Clear all';
    cl.onclick=()=>{Q=[];qi=-1;renderQueue();toast('Queue cleared');};
    sh.appendChild(cl);
  }
  sec.appendChild(sh);
  if(!Q.length){
    const e=document.createElement('div'); e.className='empty';
    e.innerHTML='<div class="e-ic">&#9776;</div><div class="e-t">Queue is empty</div><div class="e-s">Tap + on any song to add it.</div>';
    sec.appendChild(e);
  } else {
    const rows=document.createElement('div'); rows.className='rows';
    Q.forEach((song,i)=>{
      const div=document.createElement('div');
      div.className='row'+(i===qi?' np':'');
      div.onclick=()=>{qi=i;loadTrack();};
      if(song.thumb){ const img=document.createElement('img'); img.className='row-img'; img.src=song.thumb; img.alt=''; div.appendChild(img); }
      else { const ph=document.createElement('div'); ph.className='row-img-ph'; ph.textContent='\u266A'; div.appendChild(ph); }
      const inf=document.createElement('div'); inf.className='row-info';
      inf.innerHTML='<div class="row-name">'+esc(song.title)+'</div><div class="row-by">'+esc(song.artist)+'</div>';
      div.appendChild(inf);
      const rb=document.createElement('button'); rb.className='row-btn'; rb.title='Remove'; rb.textContent='\u2715';
      rb.onclick=e=>{e.stopPropagation();Q.splice(i,1);if(i<qi)qi--;renderQueue();};
      div.appendChild(rb);
      rows.appendChild(div);
    });
    sec.appendChild(rows);
  }
  sa.appendChild(sec);
}

function renderSrchEmpty(){
  ge('scroll').innerHTML='<div class="empty" style="padding-top:40px"><div class="e-ic" style="opacity:.1">&#8981;</div><div class="e-t">Search for music</div><div class="e-s">Type a song, artist, or album.</div></div>';
}

// ── SEARCH ────────────────────────────────────────────
function onSrch(v){ clearTimeout(stmr); if(!v.trim()){renderView();return;} stmr=setTimeout(()=>doSrch(v),380); }
async function doSrch(q){
  if(!q.trim()) return; skel();
  try{
    const sa=ge('scroll'); sa.innerHTML='';
    const {songs,artists,albums} = await ytmSearch(q);
    let ok=false;
    if(artists.length){ sa.appendChild(mkCards('Artists',artists)); ok=true; }
    if(albums.length){  sa.appendChild(mkCards('Albums',albums));   ok=true; }
    if(songs.length){   sa.appendChild(mkRows('Songs',songs));      ok=true; }
    if(!ok) showErr('No results found for "'+q+'"');
  }catch(e){ showErr(e.message); }
}

function clrSrch(){ ge('sinp').value=''; renderView(); }

// ── SECTION BUILDERS ──────────────────────────────────
function mkCards(title, songs){
  const sec=document.createElement('div'); sec.className='sec';
  const sh=document.createElement('div'); sh.className='sh';
  sh.innerHTML='<span class="sh-t">'+title+'</span>';
  sec.appendChild(sh);
  const hs=document.createElement('div'); hs.className='hscroll';
  songs.forEach(song=>{
    const card=document.createElement('div'); card.className='card';
    card.onclick=()=>{
      if(song.isArtist){
        ge('sinp').value=song.title;
        doSrch(song.title);
      } else if(song.isPlaylist){
        openPl(song.id, song.title);
      } else {
        playSong(song);
      }
    };
    const art=document.createElement('div'); art.className='card-img';
    if(song.thumb){
      const img=document.createElement('img'); img.src=song.thumb; img.alt=''; img.loading='lazy'; art.appendChild(img);
    } else {
      const ph=document.createElement('div'); ph.className='card-img-ph'; ph.textContent='\u266A'; art.appendChild(ph);
    }
    const ov=document.createElement('div'); ov.className='card-ov';
    const pb=document.createElement('div'); pb.className='card-pb'; pb.innerHTML='&#9654;'; ov.appendChild(pb); art.appendChild(ov);
    if(song.id===cid){ const np=document.createElement('span'); np.className='card-np'; np.textContent='Playing'; art.appendChild(np); }
    card.appendChild(art);
    const nm=document.createElement('div'); nm.className='card-name'; nm.textContent=song.title; card.appendChild(nm);
    const by=document.createElement('div'); by.className='card-by'; by.textContent=song.artist; card.appendChild(by);
    hs.appendChild(card);
  });
  sec.appendChild(hs); return sec;
}

function mkRows(title, songs){
  const sec=document.createElement('div'); sec.className='sec';
  const sh=document.createElement('div'); sh.className='sh';
  sh.innerHTML='<span class="sh-t">'+title+'</span><span class="sh-s">'+songs.length+' songs</span>';
  sec.appendChild(sh);
  const rows=document.createElement('div'); rows.className='rows';
  songs.forEach(song=>{
    const div=document.createElement('div');
    div.className='row'+(song.id===cid?' np':'');
    div.onclick=()=>playSong(song);
    if(song.thumb){
      const img=document.createElement('img'); img.className='row-img'; img.src=song.thumb; img.alt=''; img.loading='lazy'; div.appendChild(img);
    } else {
      const ph=document.createElement('div'); ph.className='row-img-ph'; ph.textContent='\u266A'; div.appendChild(ph);
    }
    const inf=document.createElement('div'); inf.className='row-info';
    inf.innerHTML='<div class="row-name">'+esc(song.title)+'</div><div class="row-by">'+esc(song.artist)+'</div>';
    div.appendChild(inf);
    const btn=document.createElement('button'); btn.className='row-btn'; btn.title='Add to queue'; btn.textContent='+';
    btn.onclick=e=>{e.stopPropagation();addToQ(song);};
    div.appendChild(btn);
    rows.appendChild(div);
  });
  sec.appendChild(rows); return sec;
}

// ── SKELETON / ERROR ──────────────────────────────────
function skel(){
  ge('scroll').innerHTML='<div class="sk-wrap">'
    +'<div class="sk-title"></div>'
    +'<div class="sk-cards">'+Array(5).fill(0).map(()=>'<div class="sk-c"><div class="sk-ca"></div><div class="sk-cl"></div><div class="sk-cl2"></div></div>').join('')+'</div>'
    +'<div class="sk-rows">'+Array(5).fill(0).map(()=>'<div class="sk-r"><div class="sk-th"></div><div class="sk-l"><div class="sk-l1"></div><div class="sk-l2"></div></div></div>').join('')+'</div>'
    +'</div>';
}
function showErr(m){
  ge('scroll').innerHTML='<div class="empty"><div class="e-ic">&#9888;</div><div class="e-t">Something went wrong</div><div class="e-s">'+esc(m)+'</div></div>';
}

// ── ACCOUNT ───────────────────────────────────────────
function togAcct(){
  amOpen=!amOpen; ge('amenu').classList.toggle('on',amOpen);
  if(amOpen) document.addEventListener('click', closeAM, true);
}
function closeAM(e){
  if(!ge('amenu').contains(e.target)&&e.target!==ge('uav')){
    amOpen=false; ge('amenu').classList.remove('on');
    document.removeEventListener('click',closeAM,true);
  }
}

// ── TOAST ─────────────────────────────────────────────
function toast(m){
  const el=document.createElement('div'); el.className='toast'; el.innerHTML=m;
  ge('tw').appendChild(el); setTimeout(()=>el.remove(),2800);
}

// ── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();togPlay();}
  if(e.code==='ArrowRight') nextT();
  if(e.code==='ArrowLeft')  prevT();
  if(e.code==='KeyL')       togLike();
  if(e.code==='Escape')     closeFP();
});

// ── HELPERS ───────────────────────────────────────────
const ge  = id => document.getElementById(id);
const fmt = s  => { s=Math.floor(s||0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
const esc = s  => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── INIT ──────────────────────────────────────────────
(function(){
  const u=localStorage.getItem('mu');
  const t=localStorage.getItem('mt');
  const exp=parseInt(localStorage.getItem('mte')||'0');
  if(u&&t&&Date.now()<exp){
    try{
      user=JSON.parse(u); tok=t;
      liked=JSON.parse(localStorage.getItem('ml_'+user.email)||'[]');
      enterApp(); return;
    }catch(e){}
  }
  localStorage.removeItem('mt'); localStorage.removeItem('mte');
  const wait=setInterval(()=>{
    if(window.google?.accounts?.id){ clearInterval(wait); initG(); }
  },80);
})();

// Legacy ytq for personal library (playlists/liked via OAuth)
async function ytq(url){
  if(!tok){ showGrant(); throw new Error('Not signed in'); }
  const r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
  if(r.status===401){ tok=null; localStorage.removeItem('mt'); localStorage.removeItem('mte'); showGrant(); throw new Error('Session expired'); }
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d;
}</script>
