<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Melodist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ─── Variables ─────────────────────────────────────────── */
:root {
  --bg:      #0c0c0f;
  --s1:      #141417;
  --s2:      #1a1a1f;
  --s3:      #222228;
  --s4:      #2c2c34;
  --text:    #f5f5f7;
  --text2:   #8e8e93;
  --text3:   #48484a;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --dyn:     #ff4d4d;
  --dr: 255; --dg: 77; --db: 77;
  --nav-h:   58px;
  --mini-h:  68px;
  --safe:    env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--s4); border-radius:2px; }

/* ─── Auth Screen ───────────────────────────────────────── */
#auth-screen {
  position:fixed; inset:0; z-index:1000;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  padding:40px 28px;
  gap:32px;
  transition:opacity 0.35s, transform 0.35s;
}
#auth-screen.hidden {
  opacity:0; pointer-events:none; transform:scale(0.96);
}
.auth-glow {
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 10%,
    rgba(var(--dr),var(--dg),var(--db),0.13) 0%, transparent 65%);
  transition:background 0.6s;
}
.auth-logo {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; text-align:center;
  gap:14px;
}
.auth-logo-icon {
  width:72px; height:72px; border-radius:22px;
  background:linear-gradient(135deg,
    rgba(var(--dr),var(--dg),var(--db),0.22),
    rgba(var(--dr),var(--dg),var(--db),0.06));
  border:1px solid rgba(var(--dr),var(--dg),var(--db),0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:2.2rem;
  box-shadow:0 8px 32px rgba(var(--dr),var(--dg),var(--db),0.18);
}
.auth-logo-name {
  font-size:2rem; font-weight:800; letter-spacing:-0.04em;
}
.auth-logo-name span { color:var(--dyn); transition:color 0.5s; }
.auth-logo-sub {
  font-size:0.88rem; color:var(--text2); margin-top:-6px; text-align:center; width:100%;
}
.auth-form {
  position:relative; z-index:1;
  width:100%; max-width:310px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:12px;
}
.auth-name-row { display:flex; gap:10px; }
.auth-input {
  flex:1; background:var(--s2);
  border:1px solid var(--border2);
  border-radius:14px; color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.95rem; padding:15px 18px;
  outline:none; transition:border-color 0.18s, box-shadow 0.18s;
  width:100%;
}
.auth-input:focus {
  border-color:rgba(var(--dr),var(--dg),var(--db),0.5);
  box-shadow:0 0 0 3px rgba(var(--dr),var(--dg),var(--db),0.08);
}
.auth-input::placeholder { color:var(--text3); }
.auth-go-btn {
  width:100%; padding:16px;
  background:var(--dyn); border:none; border-radius:14px;
  color:#fff; font-family:'Plus Jakarta Sans',sans-serif;
  font-size:1rem; font-weight:700; cursor:pointer;
  transition:all 0.18s; letter-spacing:-0.01em;
  box-shadow:0 4px 24px rgba(var(--dr),var(--dg),var(--db),0.3);
}
.auth-go-btn:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(var(--dr),var(--dg),var(--db),0.4); }
.auth-go-btn:active { transform:scale(0.97); }
.auth-go-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.auth-divider {
  display:flex; align-items:center; gap:10px; color:var(--text3);
  font-size:0.75rem; margin:2px 0;
}
.auth-divider::before,.auth-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.auth-api-row {
  display:flex; align-items:center; gap:8px;
}
.auth-api-label {
  font-size:0.7rem; color:var(--text3); white-space:nowrap;
  font-weight:500;
}
.auth-api-btn {
  background:none; border:1px solid var(--border);
  border-radius:8px; color:var(--text2);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.72rem; padding:5px 10px; cursor:pointer;
  transition:all 0.15s; white-space:nowrap;
}
.auth-api-btn:hover { border-color:var(--border2); color:var(--text); }
.auth-api-input {
  flex:1; background:var(--s2);
  border:1px solid var(--border);
  border-radius:8px; color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.72rem; padding:6px 10px;
  outline:none; transition:border-color 0.15s; display:none;
}
.auth-api-input.show { display:block; }
.auth-api-input:focus { border-color:rgba(var(--dr),var(--dg),var(--db),0.4); }
.auth-api-input::placeholder { color:var(--text3); }
.auth-bottom {
  position:relative; z-index:1;
  margin-top:20px; font-size:0.72rem; color:var(--text3); text-align:center; line-height:1.6;
}
.auth-setup-note {
  font-size:0.78rem; color:var(--text2); font-weight:600;
  margin-bottom:10px; text-align:center;
}

/* ─── Main App ──────────────────────────────────────────── */
#main-app {
  height:100vh;
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition:opacity 0.4s;
}
#main-app.visible {
  opacity:1; pointer-events:all;
}

/* ─── Topbar ────────────────────────────────────────────── */
.topbar {
  flex-shrink:0;
  padding:14px 20px 10px;
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  display:flex; align-items:center; gap:12px;
  position:relative; z-index:20;
}
.tb-logo { font-size:1.25rem; font-weight:800; letter-spacing:-0.04em; flex-shrink:0; }
.tb-logo span { color:var(--dyn); transition:color 0.5s; }
.search-bar {
  flex:1; display:flex; align-items:center; gap:9px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:12px; padding:9px 13px;
  transition:border-color 0.18s;
}
.search-bar:focus-within { border-color:var(--border2); }
.si { font-size:0.85rem; color:var(--text3); flex-shrink:0; }
.search-input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.88rem; min-width:0;
}
.search-input::placeholder { color:var(--text3); }
.search-x {
  background:none; border:none; color:var(--text3);
  font-size:0.8rem; cursor:pointer; padding:2px; display:none;
  transition:color 0.15s;
}
.search-input:not(:placeholder-shown)~.search-x { display:block; }
.search-x:hover { color:var(--text2); }
.user-avatar {
  width:32px; height:32px; border-radius:50%;
  object-fit:cover; flex-shrink:0;
  background:var(--s3); cursor:pointer;
  border:2px solid var(--border2);
  transition:border-color 0.2s;
}
.user-avatar:hover { border-color:var(--dyn); }

/* ─── Scroll area ───────────────────────────────────────── */
.scroll-area { flex:1; overflow-y:auto; overflow-x:hidden; }

/* ─── Mini player ───────────────────────────────────────── */
.mini-player {
  flex-shrink:0; margin:0 10px 6px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:16px; padding:9px 13px;
  display:flex; align-items:center; gap:11px;
  cursor:pointer; transition:background 0.15s;
  position:relative; overflow:hidden;
  min-height:var(--mini-h);
}
.mini-player::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,
    rgba(var(--dr),var(--dg),var(--db),0.07) 0%, transparent 55%);
  transition:background 0.5s; pointer-events:none;
}
.mini-player:active { background:var(--s3); }
.mini-thumb-wrap { flex-shrink:0; position:relative; }
.mini-thumb {
  width:46px; height:46px; border-radius:10px;
  object-fit:cover; display:block; background:var(--s3);
}
.mini-ph {
  width:46px; height:46px; border-radius:10px;
  background:var(--s3); display:flex; align-items:center;
  justify-content:center; font-size:1.3rem;
}
.mini-eq {
  position:absolute; inset:0; border-radius:10px;
  background:rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center;
  gap:2px; opacity:0; transition:opacity 0.2s;
}
.mini-eq.visible { opacity:1; }
.eq-bar {
  width:3px; background:var(--dyn); border-radius:2px;
  animation:eqBar 0.8s ease infinite;
}
.eq-bar:nth-child(1){height:10px;animation-delay:0s}
.eq-bar:nth-child(2){height:16px;animation-delay:0.15s}
.eq-bar:nth-child(3){height:8px;animation-delay:0.3s}
.eq-bar:nth-child(4){height:14px;animation-delay:0.1s}
@keyframes eqBar{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.mini-info { flex:1; min-width:0; }
.mini-title { font-size:0.87rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-artist { font-size:0.74rem; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-btns { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.mini-btn {
  background:none; border:none; color:var(--text2);
  font-size:1rem; cursor:pointer; padding:6px;
  border-radius:50%; transition:all 0.13s;
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px;
}
.mini-btn:hover { color:var(--text); background:rgba(255,255,255,0.06); }
.mini-play-btn {
  width:36px; height:36px;
  background:var(--dyn); color:#fff !important;
  border-radius:50%; font-size:0.88rem;
  transition:background 0.5s, transform 0.12s;
}
.mini-play-btn:active { transform:scale(0.9); }
.mini-prog-line {
  position:absolute; bottom:0; left:0; right:0; height:2px;
  background:rgba(255,255,255,0.07);
}
.mini-prog-fill {
  height:100%; background:var(--dyn);
  transition:width 0.3s linear, background 0.5s;
}

/* ─── Bottom Nav ────────────────────────────────────────── */
.bottom-nav {
  flex-shrink:0;
  display:flex; align-items:center;
  height:calc(var(--nav-h) + var(--safe));
  padding-bottom:var(--safe);
  background:var(--s1); border-top:1px solid var(--border);
  z-index:20; position:relative;
}
.bn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:4px; cursor:pointer; padding:7px 0;
  color:var(--text3); transition:color 0.15s;
}
.bn.active { color:var(--dyn); transition:color 0.5s; }
.bn-ic { font-size:1.15rem; line-height:1; }
.bn-lb { font-size:0.58rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; }

/* ─── Sections ──────────────────────────────────────────── */
.section { padding:16px 20px 8px; }
.sec-hdr { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
.sec-title { font-size:1.05rem; font-weight:700; letter-spacing:-0.02em; }
.sec-more { font-size:0.77rem; color:var(--text3); cursor:pointer; font-weight:500; }
.sec-more:hover { color:var(--text2); }

/* horizontal cards */
.h-scroll {
  display:flex; gap:12px; overflow-x:auto;
  padding:0 20px 6px; margin:0 -20px;
  scrollbar-width:none;
}
.h-scroll::-webkit-scrollbar { display:none; }
.song-card { flex-shrink:0; width:136px; cursor:pointer; }
.card-art {
  width:136px; height:136px; border-radius:14px;
  overflow:hidden; background:var(--s2); position:relative;
  margin-bottom:9px;
}
.card-art img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform 0.25s;
}
.song-card:active .card-art img { transform:scale(0.96); }
.card-overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.35);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.16s;
}
.song-card:hover .card-overlay { opacity:1; }
.card-pb {
  width:42px; height:42px; background:white; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:#000;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
}
.card-np {
  position:absolute; top:7px; right:7px;
  background:var(--dyn); border-radius:100px;
  padding:2px 7px; font-size:0.53rem; font-weight:700;
  letter-spacing:0.07em; text-transform:uppercase; color:#fff;
  transition:background 0.5s; animation:npBlink 2s ease infinite;
}
@keyframes npBlink{0%,100%{opacity:1}50%{opacity:.45}}
.card-title { font-size:0.81rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.card-artist { font-size:0.71rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ─── Playlist chips ────────────────────────────────────── */
.pl-chips {
  display:flex; gap:8px; overflow-x:auto;
  padding:0 20px 6px; margin:0 -20px;
  scrollbar-width:none;
}
.pl-chips::-webkit-scrollbar { display:none; }
.pl-chip {
  flex-shrink:0; display:flex; align-items:center; gap:9px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:12px; padding:10px 14px;
  cursor:pointer; transition:all 0.15s;
}
.pl-chip:hover, .pl-chip:active { background:var(--s3); border-color:var(--border2); }
.pl-chip-thumb {
  width:36px; height:36px; border-radius:8px;
  object-fit:cover; background:var(--s3); flex-shrink:0;
}
.pl-chip-ph {
  width:36px; height:36px; border-radius:8px;
  background:var(--s3); display:flex; align-items:center;
  justify-content:center; font-size:1rem; flex-shrink:0;
}
.pl-chip-name { font-size:0.82rem; font-weight:600; white-space:nowrap; max-width:120px; overflow:hidden; text-overflow:ellipsis; }
.pl-chip-count { font-size:0.7rem; color:var(--text2); margin-top:2px; }

/* ─── Song rows ─────────────────────────────────────────── */
.song-rows { display:flex; flex-direction:column; }
.song-row {
  display:flex; align-items:center; gap:12px;
  padding:9px 0; cursor:pointer; border-radius:11px;
  transition:background 0.12s;
}
.song-row:active { background:var(--s2); padding:9px 8px; margin:0 -8px; }
.song-row.playing .row-title { color:var(--dyn); transition:color 0.5s; }
.row-art {
  width:50px; height:50px; border-radius:9px;
  object-fit:cover; flex-shrink:0; background:var(--s2);
}
.row-info { flex:1; min-width:0; }
.row-title { font-size:0.87rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-artist { font-size:0.75rem; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-add {
  background:none; border:none; color:var(--text3);
  font-size:1.2rem; cursor:pointer; padding:6px; flex-shrink:0;
  transition:color 0.13s; line-height:1; border-radius:50%;
}
.row-add:hover { color:var(--dyn); }

/* ─── Full Player ───────────────────────────────────────── */
.full-player {
  position:fixed; inset:0; z-index:300;
  background:var(--bg);
  display:flex; flex-direction:column;
  padding-bottom:calc(var(--safe) + 8px);
  transform:translateY(100%);
  transition:transform 0.38s cubic-bezier(0.32,0,0.15,1);
  will-change:transform;
}
.full-player.open { transform:translateY(0); }
.fp-bg {
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 120% 55% at 50% 0%,
    rgba(var(--dr),var(--dg),var(--db),0.2) 0%, transparent 65%);
  transition:background 0.6s;
}
.fp-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px 6px;
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  position:relative; z-index:1;
}
.fp-close {
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,0.07); border:none;
  color:var(--text2); font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.fp-close:hover { background:rgba(255,255,255,0.12); color:var(--text); }
.fp-lbl { font-size:0.72rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); }
.fp-more {
  width:34px; height:34px; border-radius:50%;
  background:rgba(255,255,255,0.07); border:none;
  color:var(--text2); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* Glowing Art */
.fp-art-wrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:8px 44px; position:relative; z-index:1;
}
.fp-art-container {
  position:relative;
  display:inline-flex; align-items:center; justify-content:center;
}
/* Deep glow blob */
.fp-glow {
  position:absolute; inset:-20%;
  background:radial-gradient(circle,
    rgba(var(--dr),var(--dg),var(--db),0.5) 0%,
    rgba(var(--dr),var(--dg),var(--db),0.15) 40%,
    transparent 70%);
  transition:background 0.6s;
  filter:blur(20px);
  pointer-events:none; z-index:0;
  animation:glowPulse 4s ease infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.8;transform:scale(1)}50%{opacity:0.5;transform:scale(0.92)}}
/* Gradient ring border */
.fp-ring {
  position:absolute; inset:-3px; border-radius:27px;
  background:conic-gradient(
    rgba(var(--dr),var(--dg),var(--db),0.9) 0deg,
    rgba(var(--dr),var(--dg),var(--db),0.2) 90deg,
    rgba(var(--dr),var(--dg),var(--db),0.8) 180deg,
    rgba(var(--dr),var(--dg),var(--db),0.15) 270deg,
    rgba(var(--dr),var(--dg),var(--db),0.9) 360deg
  );
  transition:background 0.6s;
  animation:ringRotate 4s linear infinite;
  z-index:1;
}
@keyframes ringRotate{to{transform:rotate(360deg)}}
/* Gap between ring and art */
.fp-ring-inner { position:absolute; inset:1.5px; border-radius:25.5px; background:var(--bg); z-index:2; }
/* The actual art */
.fp-art {
  width:calc(100vw - 88px); max-width:320px;
  height:calc(100vw - 88px); max-height:320px;
  border-radius:24px; object-fit:cover; display:block;
  position:relative; z-index:3;
  box-shadow:0 16px 60px rgba(0,0,0,0.6);
}
.fp-art-ph {
  width:calc(100vw - 88px); max-width:320px;
  height:calc(100vw - 88px); max-height:320px;
  border-radius:24px; background:var(--s2);
  display:flex; align-items:center; justify-content:center;
  font-size:5rem; position:relative; z-index:3;
}

/* Info */
.fp-info {
  padding:0 28px 6px; display:flex;
  align-items:flex-start; justify-content:space-between;
  position:relative; z-index:1;
}
.fp-song { min-width:0; flex:1; }
.fp-song-title { font-size:1.3rem; font-weight:800; letter-spacing:-0.03em; line-height:1.15; margin-bottom:4px; }
.fp-song-artist { font-size:0.92rem; color:var(--text2); font-weight:500; }
.fp-heart {
  background:none; border:none; font-size:1.4rem;
  cursor:pointer; padding:4px 0 4px 12px;
  color:var(--text3); flex-shrink:0; margin-top:2px;
  transition:all 0.2s;
}
.fp-heart.on { color:var(--dyn); transition:color 0.5s; }

/* Progress */
.fp-prog-wrap {
  padding:10px 28px 6px; position:relative; z-index:1;
}
.fp-prog-track {
  height:4px; background:rgba(255,255,255,0.1);
  border-radius:2px; cursor:pointer; margin-bottom:7px;
  position:relative; overflow:visible;
}
.fp-prog-fill {
  height:100%; border-radius:2px;
  background:var(--dyn); transition:width 0.1s linear, background 0.5s;
  pointer-events:none; position:relative;
}
.fp-prog-fill::after {
  content:''; position:absolute; right:-6px; top:50%;
  transform:translateY(-50%);
  width:12px; height:12px; background:white; border-radius:50%;
  box-shadow:0 0 10px rgba(var(--dr),var(--dg),var(--db),0.7);
  opacity:0; transition:opacity 0.15s;
}
.fp-prog-track:hover .fp-prog-fill::after { opacity:1; }

<script>
// ═══════════════════════════════════════════════════════
//  PASTE YOUR GOOGLE CLIENT ID HERE (one-time setup)
//  → console.cloud.google.com → APIs → Credentials
//  → Create OAuth Client ID → Web App → copy it here
//  → Add your site URL as Authorized JS Origin (no redirect URI needed)
// ═══════════════════════════════════════════════════════
let CLIENT_ID = '865372017316-1ir04ugkdhpd94leeh7gt7069ksl14h3.apps.googleusercontent.com';

// ── App State ─────────────────────────────────────────
let userInfo = null, ytToken = null;
let player, ytReady = false;
let queue = [], qIdx = -1, playing = false;
let shuffle = false, repeat = 0, vol = 80, muted = false;
let liked = [], currentId = null, progTimer = null, searchTimer = null;
let currentView = 'home', acctOpen = false;

// ── Google Sign-In ────────────────────────────────────
function initGoogle() {
  google.accounts.id.initialize({
    client_id:   CLIENT_ID,
    callback:    onSignedIn,
    auto_select: false,
    context:     'signin',
  });

  // Render the official button
  google.accounts.id.renderButton(
    document.getElementById('g-btn'),
    { theme: 'filled_black', size: 'large', shape: 'pill', text: 'signin_with', width: 280 }
  );

  // Also try One Tap popup
  google.accounts.id.prompt();
}

function onSignedIn(credentialResponse) {
  // Decode JWT — contains name, email, picture. No extra API call needed.
  const p = JSON.parse(atob(credentialResponse.credential.split('.')[1]));
  userInfo = { name: p.name, email: p.email, avatar: p.picture };
  localStorage.setItem('melo_user', JSON.stringify(userInfo));
  liked = JSON.parse(localStorage.getItem('melo_liked_' + p.email) || '[]');

  // Request YouTube read scope silently (same Client ID, no extra login)
  const tc = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope:     'https://www.googleapis.com/auth/youtube.readonly',
    callback:  (r) => { ytToken = r.access_token; localStorage.setItem('melo_tok', r.access_token); enterApp(); },
    error_callback: () => enterApp(), // still enter even if YT scope fails
  });
  tc.requestAccessToken({ prompt: '' });
}


function enterApp() {
  if (!userInfo) return;
  // Avatar
  ['user-av','acct-av'].forEach(id => {
    const el = document.getElementById(id);
    if (el && userInfo.avatar) el.src = userInfo.avatar;
  });
  document.getElementById('acct-name').textContent  = userInfo.name;
  document.getElementById('acct-email').textContent = userInfo.email;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('main-app').classList.add('visible');
  renderHome();
}

function signOut() {
  if (window.google?.accounts?.id) google.accounts.id.disableAutoSelect();
  ['melo_user','melo_tok'].forEach(k => localStorage.removeItem(k));
  userInfo = null; ytToken = null; liked = [];
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('main-app').classList.remove('visible');
  acctOpen = false; document.getElementById('acct-menu').classList.remove('open');
  toast('Signed out');
  setTimeout(initGoogle, 200);
}

// ── YouTube Data API ──────────────────────────────────
async function ytFetch(url) {
  if (!ytToken) throw new Error('NO_TOKEN');
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + ytToken } });
  if (r.status === 401) { toast('Session expired — sign out and back in'); throw new Error('Token expired'); }
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d;
}
async function ytSearch(q, n=20) {
  const d = await ytFetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&q=${encodeURIComponent(q)}&maxResults=${n}&regionCode=US`);
  return (d.items||[]).map(toSong);
}
function toSong(it) {
  return {
    id:     it.id.videoId||it.id,
    title:  clean(it.snippet.title),
    artist: it.snippet.channelTitle.replace(/ - Topic$/,'').replace(/VEVO$/,'').replace(/ Official$/,''),
    thumb:  it.snippet.thumbnails?.medium?.url||it.snippet.thumbnails?.default?.url||'',
  };
}
function clean(t){ return (t||'').replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>'); }

// ── YT IFrame Player ──────────────────────────────────
window.onYouTubeIframeAPIReady = () => {
  player = new YT.Player('yt', {
    height:'1', width:'1',
    playerVars:{ autoplay:0, controls:0, playsinline:1 },
    events:{
      onReady: ()=>{ ytReady=true; player.setVolume(vol); },
      onStateChange: e => {
        const S=YT.PlayerState;
        if(e.data===S.PLAYING){ playing=true;  updateBtns(); startTimer(); }
        if(e.data===S.PAUSED) { playing=false; updateBtns(); }
        if(e.data===S.ENDED)  { handleEnd(); }
        if(e.data===S.BUFFERING){ ge('mini-play').textContent=ge('fp-pl').textContent='…'; }
      },
      onError: ()=>{ toast('Playback error'); nextTrack(); }
    }
  });
};
const yts=document.createElement('script'); yts.src='https://www.youtube.com/iframe_api'; document.head.appendChild(yts);

function handleEnd(){
  if(repeat===2){ player.seekTo(0); player.playVideo(); }
  else if(repeat===1||qIdx<queue.length-1){ nextTrack(); }
  else{ playing=false; updateBtns(); stopTimer(); }
}

// ── Playback ──────────────────────────────────────────
function playSong(song){
  const ex=queue.findIndex(s=>s.id===song.id);
  if(ex!==-1){ qIdx=ex; } else { queue.push(song); qIdx=queue.length-1; }
  loadTrack();
}
function addQueue(song){
  if(queue.some(s=>s.id===song.id)){ toast('Already in queue'); return; }
  queue.push(song); toast('+ '+song.title);
  if(queue.length===1){ qIdx=0; loadTrack(); }
  if(currentView==='queue') renderView();
}
function loadTrack(){
  if(qIdx<0||qIdx>=queue.length) return;
  const s=queue[qIdx]; currentId=s.id;
  ge('mini-title').textContent=s.title; ge('mini-artist').textContent=s.artist;
  ge('fp-title').textContent=s.title;   ge('fp-artist').textContent=s.artist;
  document.title=s.title+' — melo.';
  const mt=ge('mini-thumb'),mp=ge('mini-ph'),fa=ge('fp-art'),fp=ge('fp-ph');
  if(s.thumb){
    mt.src=s.thumb; mt.style.display='block'; mp.style.display='none';
    fa.src=s.thumb; fa.style.display='block'; fp.style.display='none';
    pullColor(s.thumb);
  }
  updateLikeBtn();
  if(currentView==='queue') renderView();
  if(ytReady){ player.loadVideoById(s.id); playing=true; updateBtns(); }
}
function togglePlay(){ if(!ytReady||!currentId)return; playing?player.pauseVideo():player.playVideo(); }
function nextTrack(){ if(!queue.length)return; qIdx=shuffle?rnd():(qIdx+1)%queue.length; loadTrack(); }
function prevTrack(){
  if(!queue.length)return;
  if(ytReady&&player.getCurrentTime()>3){ player.seekTo(0); return; }
  qIdx=qIdx>0?qIdx-1:queue.length-1; loadTrack();
}
function rnd(){ let n=Math.floor(Math.random()*queue.length); return n===qIdx?(n+1)%queue.length:n; }
function toggleShuffle(){ shuffle=!shuffle; ge('fp-sh').classList.toggle('on',shuffle); toast(shuffle?'⇄ Shuffle on':'⇄ off'); }
function toggleRepeat(){
  repeat=(repeat+1)%3;
  ge('fp-rp').textContent=['↻','↻','↻¹'][repeat];
  ge('fp-rp').classList.toggle('on',repeat>0);
  toast(['Repeat off','Repeat all','Repeat one'][repeat]);
}

// ── Volume ────────────────────────────────────────────
function setVol(e){ const r=ge('fp-vt').getBoundingClientRect(); vol=Math.round(Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100))); muted=false; applyVol(); }
function toggleMute(){ muted=!muted; applyVol(); }
function applyVol(){
  const v=muted?0:vol; if(ytReady) player.setVolume(v);
  ge('fp-vf').style.width=v+'%';
  ge('fp-vi').textContent=v===0?'🔇':v<50?'🔉':'🔈';
}

// ── Like ──────────────────────────────────────────────
function toggleLike(){
  if(!currentId) return;
  const s=queue[qIdx]; if(!s) return;
  const i=liked.findIndex(x=>x.id===s.id);
  i===-1?(liked.push(s),toast('♥ Liked')):(liked.splice(i,1),toast('Removed'));
  localStorage.setItem('melo_liked_'+(userInfo?.email||'x'), JSON.stringify(liked));
  updateLikeBtn(); if(currentView==='liked') renderView();
}
function updateLikeBtn(){
  const on=currentId&&liked.some(s=>s.id===currentId);
  ge('fp-heart').textContent=on?'♥':'♡';
  ge('fp-heart').classList.toggle('on',on);
}

// ── Progress ──────────────────────────────────────────
function startTimer(){ stopTimer(); progTimer=setInterval(tick,500); }
function stopTimer(){ if(progTimer){clearInterval(progTimer);progTimer=null;} }
function tick(){
  if(!ytReady||!playing) return;
  try{
    const c=player.getCurrentTime()||0, t=player.getDuration()||0, p=t>0?c/t*100:0;
    ge('fp-pf2').style.width=p+'%'; ge('mini-pf').style.width=p+'%';
    ge('fp-curr').textContent=fmt(c); ge('fp-total').textContent=fmt(t);
  }catch(e){}
}
function seek(e){ if(!ytReady||!currentId)return; const r=ge('fp-pt').getBoundingClientRect(); player.seekTo(((e.clientX-r.left)/r.width)*(player.getDuration()||0)); }

// ── EQ animation ──────────────────────────────────────
function updateBtns(){
  const ic=playing?'⏸':'▶';
  ge('mini-play').textContent=ic; ge('fp-pl').textContent=ic;
  ge('mini-eq').classList.toggle('visible',playing);
}

// ── Dynamic color ─────────────────────────────────────
function pullColor(url){
  const img=new Image(); img.crossOrigin='anonymous'; img.src=url+'?t='+Date.now();
  img.onload=()=>{
    try{
      const c=document.createElement('canvas'); c.width=c.height=14;
      const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,14,14);
      const d=ctx.getImageData(0,0,14,14).data;
      let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){ const br=(d[i]+d[i+1]+d[i+2])/3; if(br>25&&br<225){r+=d[i];g+=d[i+1];b+=d[i+2];n++;} }
      if(!n) return;
      const mx=Math.max(r/n,g/n,b/n), sc=210/mx;
      r=Math.round(Math.min(255,(r/n)*sc)); g=Math.round(Math.min(255,(g/n)*sc)); b=Math.round(Math.min(255,(b/n)*sc));
      const root=document.documentElement;
      root.style.setProperty('--dyn',`rgb(${r},${g},${b})`);
      root.style.setProperty('--dr',r); root.style.setProperty('--dg',g); root.style.setProperty('--db',b);
    }catch(e){}
  };
}

// ── Views ─────────────────────────────────────────────
function setView(v){
  currentView=v;
  ['home','search','library','queue'].forEach(k=>ge('bn-'+k)?.classList.toggle('active',k===v));
  renderView();
}
function renderView(){
  if(currentView==='home')    renderHome();
  if(currentView==='search')  renderSearchEmpty();
  if(currentView==='library') renderLibrary();
  if(currentView==='queue')   renderQueue();
  if(currentView==='liked')   renderLiked();
}
function focusSearch(){ setTimeout(()=>ge('s-inp').focus(),100); }

async function renderHome(){
  showSkeleton();
  try{
    const [a,b,c]=await Promise.allSettled([ytSearch('top hits 2024',10),ytSearch('new music this week',10),ytSearch('lofi hip hop chill',8)]);
    const sa=ge('scroll-area'); sa.innerHTML='';
    const hour=new Date().getHours();
    const greet=hour<12?'🌅 Good morning':hour<18?'☀️ Good afternoon':'🌙 Good evening';
    const hdr=document.createElement('div'); hdr.className='section';
    hdr.innerHTML = '<div style="font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:2px">'+greet+', '+(userInfo?.name?.split(' ')[0]||'')+'.</div><div style="font-size:0.82rem;color:var(--text2)">What is hot today</div>';
    sa.appendChild(hdr);
    if(liked.length) sa.appendChild(makeCards('♥ Your Liked',liked.slice(0,10)));
    if(a.status==='fulfilled') sa.appendChild(makeCards('🔥 Top Charts',a.value));
    if(b.status==='fulfilled') sa.appendChild(makeRows('✨ Fresh Drops',b.value));
    if(c.status==='fulfilled') sa.appendChild(makeCards('😌 Chill Vibes',c.value));
  }catch(e){ showErr(e.message==='NO_TOKEN'?'Sign out and sign back in to refresh your session.':e.message); }
}

async function renderLibrary(){
  showSkeleton();
  try{
    const d=await ytFetch('https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&mine=true&maxResults=20');
    const pls=d.items||[];
    const sa=ge('scroll-area'); sa.innerHTML='';
    const sec=document.createElement('div'); sec.className='section';
    sec.innerHTML='<div class="sec-hdr"><span class="sec-title">📚 Your Library</span></div>';
    if(!pls.length){
      sec.innerHTML+='<div class="empty"><div class="empty-ic">⊞</div><div class="empty-t">No playlists found</div><div class="empty-s">Create playlists on YouTube Music and they will show here.</div></div>';
    } else {
      const chips=document.createElement('div'); chips.className='pl-chips';
      chips.innerHTML=`<div class="pl-chip" onclick="setView('liked')"><div class="pl-chip-ph">♥</div><div><div class="pl-chip-name">Liked Songs</div><div class="pl-chip-count">${liked.length} songs</div></div></div>`
        + pls.map(pl=>`<div class="pl-chip" onclick="openPl('${pl.id}','${esc(pl.snippet.title)}')">${pl.snippet.thumbnails?.default?.url?`<img class="pl-chip-thumb" src="${pl.snippet.thumbnails.default.url}"/>`:'<div class="pl-chip-ph">♪</div>'}<div><div class="pl-chip-name">${esc(pl.snippet.title)}</div><div class="pl-chip-count">${pl.contentDetails?.itemCount||0} songs</div></div></div>`).join('');
      sec.appendChild(chips);
    }
    sa.appendChild(sec);
  }catch(e){ showErr(e.message); }
}

async function openPl(id,title){
  showSkeleton();
  try{
    const d=await ytFetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${id}&maxResults=30`);
    const songs=(d.items||[]).map(it=>({
      id:it.snippet.resourceId?.videoId||'', title:clean(it.snippet.title),
      artist:it.snippet.videoOwnerChannelTitle?.replace(/ - Topic$/,'').replace(/VEVO$/,'')||'',
      thumb:it.snippet.thumbnails?.medium?.url||it.snippet.thumbnails?.default?.url||'',
    })).filter(s=>s.id);
    const sa=ge('scroll-area'); sa.innerHTML='';
    sa.appendChild(makeRows('📋 '+title, songs));
  }catch(e){ showErr(e.message); }
}

function renderLiked(){
  const sa=ge('scroll-area'); sa.innerHTML='';
  if(!liked.length){
    sa.innerHTML='<div class="empty"><div class="empty-ic">♡</div><div class="empty-t">No liked songs yet</div><div class="empty-s">Tap ♡ while a song plays to save it here.</div></div>';
  } else {
    sa.appendChild(makeRows('♥ Liked Songs',liked));
  }
}

function renderQueue(){
  const sa=ge('scroll-area'); sa.innerHTML='';
  const sec=document.createElement('div'); sec.className='section';
  sec.innerHTML=`<div class="sec-hdr"><span class="sec-title">Queue</span><span class="sec-more" onclick="queue=[];qIdx=-1;renderView();toast('Cleared')">${queue.length?'Clear':''}</span></div>`;
  if(!queue.length){
    sec.innerHTML+='<div class="empty"><div class="empty-ic">☰</div><div class="empty-t">Queue is empty</div><div class="empty-s">Tap + on any song to add it.</div></div>';
  } else {
    const rows=document.createElement('div'); rows.className='song-rows';
    rows.innerHTML=queue.map((s,i)=>`<div class="song-row${i===qIdx?' playing':''}" onclick="qIdx=${i};loadTrack()"><img class="row-art" src="${s.thumb}" alt=""/><div class="row-info"><div class="row-title">${esc(s.title)}</div><div class="row-artist">${esc(s.artist)}</div></div><button class="row-add" onclick="event.stopPropagation();queue.splice(${i},1);if(${i}<qIdx)qIdx--;renderView()">✕</button></div>`).join('');
    sec.appendChild(rows);
  }
  sa.appendChild(sec);
}

function renderSearchEmpty(){
  ge('scroll-area').innerHTML='<div class="empty" style="padding-top:40px"><div class="empty-ic" style="opacity:.15">⌕</div><div class="empty-t">Search for anything</div><div class="empty-s">Type a song, artist, or album above.</div></div>';
}

function onSearch(v){ clearTimeout(searchTimer); if(!v.trim()){renderView();return;} searchTimer=setTimeout(()=>doSearch(v),380); }
async function doSearch(q){
  if(!q.trim()) return; showSkeleton();
  try{ const songs=await ytSearch(q,24); const sa=ge('scroll-area'); sa.innerHTML=''; sa.appendChild(makeRows(`"${q}"`,songs)); }
  catch(e){ showErr(e.message); }
}
function clearSearch(){ ge('s-inp').value=''; renderView(); }

// ── Section builders ──────────────────────────────────
function makeCards(title,songs){
  const sec=document.createElement('div'); sec.className='section';
  sec.innerHTML=`<div class="sec-hdr"><span class="sec-title">${title}</span></div>`;
  const sc=document.createElement('div'); sc.className='h-scroll';
  sc.innerHTML=songs.map(s=>{const sj=encodeURIComponent(JSON.stringify(s));return`<div class="song-card" onclick="playSong(JSON.parse(decodeURIComponent('${sj}')))"><div class="card-art"><img src="${s.thumb}" loading="lazy"/><div class="card-overlay"><div class="card-pb">▶</div></div>${s.id===currentId?'<span class="card-np">Playing</span>':''}</div><div class="card-title">${esc(s.title)}</div><div class="card-artist">${esc(s.artist)}</div></div>`;}).join('');
  sec.appendChild(sc); return sec;
}
function makeRows(title,songs){
  const sec=document.createElement('div'); sec.className='section';
  sec.innerHTML=`<div class="sec-hdr"><span class="sec-title">${title}</span><span class="sec-more">${songs.length} songs</span></div>`;
  const rows=document.createElement('div'); rows.className='song-rows';
  rows.innerHTML=songs.map(s=>{const sj=encodeURIComponent(JSON.stringify(s));return`<div class="song-row${s.id===currentId?' playing':''}" onclick="playSong(JSON.parse(decodeURIComponent('${sj}')))"><img class="row-art" src="${s.thumb}" loading="lazy"/><div class="row-info"><div class="row-title">${esc(s.title)}</div><div class="row-artist">${esc(s.artist)}</div></div><button class="row-add" onclick="event.stopPropagation();addQueue(JSON.parse(decodeURIComponent('${sj}')))" title="Queue">+</button></div>`;}).join('');
  sec.appendChild(rows); return sec;
}

// ── Loading / Error ───────────────────────────────────
function showSkeleton(){
  ge('scroll-area').innerHTML=`<div class="section"><div class="sec-hdr"><div style="height:18px;width:140px;background:var(--s2);border-radius:6px;animation:skFade 1.4s ease infinite"></div></div></div><div class="sk-cards">${Array(5).fill(0).map(()=>'<div class="sk-c"><div class="sk-c-art"></div><div class="sk-c-l1"></div><div class="sk-c-l2"></div></div>').join('')}</div><div class="section" style="padding-top:20px"><div class="sk-rows">${Array(6).fill(0).map(()=>'<div class="sk-row"><div class="sk-thumb"></div><div class="sk-l"><div class="sk-l1"></div><div class="sk-l2"></div></div></div>').join('')}</div></div>`;
}
function showErr(msg){ ge('scroll-area').innerHTML=`<div class="empty"><div class="empty-ic">⚠</div><div class="empty-t">Something went wrong</div><div class="empty-s">${esc(msg)}</div></div>`; }

// ── Full player ───────────────────────────────────────
function openFull(){ ge('full-player').classList.add('open'); }
function closeFull(){ ge('full-player').classList.remove('open'); }

// ── Account menu ──────────────────────────────────────
function toggleAcctMenu(){
  acctOpen=!acctOpen; ge('acct-menu').classList.toggle('open',acctOpen);
  if(acctOpen) document.addEventListener('click', closeOnClick, true);
}
function closeOnClick(e){
  if(!ge('acct-menu').contains(e.target)&&e.target!==ge('user-av')){
    acctOpen=false; ge('acct-menu').classList.remove('open');
    document.removeEventListener('click',closeOnClick,true);
  }
}

// ── Toast ─────────────────────────────────────────────
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; ge('tw').appendChild(el); setTimeout(()=>el.remove(),2800); }

// ── Keyboard ──────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight') nextTrack();
  if(e.code==='ArrowLeft')  prevTrack();
  if(e.code==='KeyL')       toggleLike();
  if(e.code==='Escape')     closeFull();
});

// ── Helpers ───────────────────────────────────────────
const ge=id=>document.getElementById(id);
const fmt=s=>{s=Math.floor(s||0);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Init ──────────────────────────────────────────────
(function(){
  // Restore session
  const u=localStorage.getItem('melo_user'), t=localStorage.getItem('melo_tok');
  if(u&&t){
    try{
      userInfo=JSON.parse(u); ytToken=t;
      liked=JSON.parse(localStorage.getItem('melo_liked_'+userInfo.email)||'[]');
      enterApp(); return;
    }catch(e){}
  }
  // Init Google sign-in once GIS loads
  const wait=setInterval(()=>{
    if(window.google?.accounts?.id){ clearInterval(wait); initGoogle(); }
  },80);
})();
</script>
